name: Temporary Idempotency Inspection

on:
  push:
    branches: [fix/api-command-idempotency]
    paths:
      - .github/workflows/idempotency-inspection-temporary.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect exact source context
        run: |
          set -euo pipefail
          mkdir -p inspection
          files=(
            package.json
            src/lib/db.ts
            src/lib/db-migration-plan.ts
            src/lib/db-migrate-command-idempotency.ts
            src/lib/security/command-idempotency.ts
            src/lib/admin-withdrawal.ts
            src/lib/withdrawal-service.ts
            src/lib/trading-engine/index.ts
            src/app/api/admin/withdrawals/[id]/route.ts
            src/app/api/auth/withdraw/[id]/route.ts
            src/app/api/auth/withdraw/authorize/route.ts
            src/app/api/offline-sync/route.ts
            src/app/api/orders/[id]/route.ts
            src/tests/security/command-idempotency.test.ts
            scripts/check-api-security-manifest.mjs
            config/api-security-exceptions.json
          )
          for file in "${files[@]}"; do
            test -f "$file"
            mkdir -p "inspection/$(dirname "$file")"
            cp "$file" "inspection/$file"
          done
          git rev-parse HEAD > inspection/HEAD_SHA.txt
      - uses: actions/upload-artifact@v4
        with:
          name: idempotency-source-context-${{ github.sha }}
          path: inspection
          if-no-files-found: error
          retention-days: 2
