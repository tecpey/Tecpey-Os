name: One-shot Browser Review Hardening

on:
  push:
    branches: [fix/public-browser-golden-path]

permissions:
  contents: write

concurrency:
  group: one-shot-browser-review-hardening
  cancel-in-progress: false

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/public-browser-golden-path
          fetch-depth: 0

      - name: Apply exact reviewed product fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              source = file.read_text()
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:100]!r}")
              file.write_text(source.replace(old, new, 1))

          replace_once(
              "src/components/academy/GlobalAiMentorWidget.tsx",
              "  if (!academyChecked) return null;",
              "  if (!academyChecked || !academyProfileReady) return null;",
          )

          replace_once(
              "src/components/academy/PublicMentorEntry.tsx",
              '''        const data = await response.json();
                  if (!active) return;
                  setProfileStatus(data?.profile?.display_name ? "ready" : "absent");''',
              '''        if (!response.ok) {
                    throw new Error(`academy_profile_status_${response.status}`);
                  }
                  const data = (await response.json()) as {
                    profile?: { display_name?: unknown } | null;
                  } | null;
                  if (
                    !data ||
                    typeof data !== "object" ||
                    !Object.prototype.hasOwnProperty.call(data, "profile")
                  ) {
                    throw new Error("academy_profile_response_invalid");
                  }
                  if (!active) return;
                  const displayName = data.profile?.display_name;
                  setProfileStatus(
                    typeof displayName === "string" && displayName.trim()
                      ? "ready"
                      : "absent",
                  );''',
          )

          replace_once(
              "src/app/home/enterprise/TecpeyEnterpriseLanding.tsx",
              '["بازارها", "زنده"],',
              '["نمای بازار", "آموزشی"],',
          )

          replace_once(
              "src/app/en/EnglishLandingClient.tsx",
              '''  const metrics = [
                { value: "7", label: "academy terms", hint: "from basics to trading psychology" },
                { value: "50+", label: "crypto dossiers", hint: "with market data and risk context" },
                { value: "20+", label: "trader tools", hint: "analysis, risk, on-chain and macro" },
                { value: "1 path", label: "safer entry", hint: "learn → analyze → practice → decide" },
              ];''',
              '''  const metrics = [
                { value: "7", label: "academy terms", hint: "from basics to trading psychology" },
                { value: "$100K", label: "virtual Arena capital", hint: "server-owned practice balance" },
                { value: "3", label: "Arena attempts", hint: "per governed practice cycle" },
                { value: "1 path", label: "safer entry", hint: "learn → analyze → practice → decide" },
              ];''',
          )
          replace_once(
              "src/app/en/EnglishLandingClient.tsx",
              '{ icon: TrendingUp, title: "Online market board", text: "Learn first, then review live Bitcoin, Tether, Ethereum and other major crypto markets before making decisions." },',
              '{ icon: TrendingUp, title: "Market learning board", text: "Learn first, then review available Bitcoin, Tether, Ethereum and other major-market data in an educational context." },',
          )
          replace_once(
              "src/app/en/EnglishLandingClient.tsx",
              '{ icon: MousePointerClick, title: "Practice", desc: "Quizzes, XP, real scenarios and readiness checks." },',
              '{ icon: MousePointerClick, title: "Practice", desc: "Quizzes, guided exercises and readiness checks." },',
          )
          replace_once(
              "src/app/en/EnglishLandingClient.tsx",
              '["Crypto trading platform", "Buy, sell and review live markets with a simple and understandable experience."],',
              '["Market access activation", "Live financial services remain gated until their operational, compliance and release evidence is approved."],',
          )

          replace_once(
              "src/app/layout.tsx",
              'alternateName: ["تک‌پی", "TecPey Crypto Exchange"],',
              'alternateName: ["تک‌پی", "TecPey Financial Education Platform"],',
          )
          replace_once(
              "src/app/layout.tsx",
              '{ "@type": "Service", "@id": "https://tecpey.ir/#exchange", name: "TecPey Exchange", alternateName: "صرافی تک‌پی", url: "https://tecpey.ir", serviceType: "Cryptocurrency Exchange", areaServed: "IR" },',
              '{ "@type": "Service", "@id": "https://tecpey.ir/#market-readiness", name: "TecPey Market Readiness", alternateName: "مسیر آمادگی بازار تک‌پی", url: "https://tecpey.ir/academy/trading-arena", serviceType: "Financial Education and Virtual Trading Practice", areaServed: "IR" },',
          )
          replace_once(
              "src/app/layout.tsx",
              '''    "@type": "FinancialService",
                  "@id": "https://tecpey.ir/#financial-service",''',
              '''    "@type": "EducationalOrganization",
                  "@id": "https://tecpey.ir/#academy-organization",''',
          )
          replace_once(
              "src/app/layout.tsx",
              'description: "TecPey is a Persian crypto exchange experience for live crypto prices, cryptocurrency education, security guidance and a clearer start in the Iran crypto market.",',
              'description: "TecPey is a Persian financial-education and virtual-trading-practice platform focused on security, risk awareness and a clearer entry into digital-asset markets.",',
          )
          replace_once(
              "src/app/layout.tsx",
              '''    serviceType: [
                    "Cryptocurrency exchange",
                    "Persian crypto exchange",
                    "Crypto market board",
                    "Cryptocurrency education",
                    "Crypto glossary",
                    "Crypto comparison platform"
                  ],
                  provider: {
                    "@id": "https://tecpey.ir/#organization"
                  }''',
              '''    knowsAbout: [
                    "Cryptocurrency education",
                    "Account security",
                    "Risk management",
                    "Virtual trading practice",
                    "Digital asset literacy"
                  ],
                  parentOrganization: {
                    "@id": "https://tecpey.ir/#organization"
                  }''',
          )
          replace_once(
              "src/app/layout.tsx",
              'default: "تک‌پی | صرافی رمزارز امن، سریع و شفاف",',
              'default: "تک‌پی | آموزش رمزارز، تریدینگ آرنا و منتور هوشمند",',
          )
          replace_once(
              "src/app/layout.tsx",
              '"تک‌پی صرافی رمزارز فارسی برای مشاهده قیمت لحظه‌ای، خرید و فروش تتر و بیت‌کوین، آموزش، امنیت حساب و شروع سریع معامله است.",',
              '"تک‌پی پلتفرم آموزش رمزارز، تمرین معاملاتی با سرمایه مجازی، منتور هوشمند و یادگیری امنیت و مدیریت ریسک است؛ خدمات مالی تنها پس از فعال‌سازی و تأیید عملیاتی ارائه می‌شوند.",',
          )
          replace_once(
              "src/app/layout.tsx",
              '''      "صرافی ارز دیجیتال",
                    "خرید بیت کوین",
                    "خرید تتر",
                    "قیمت رمزارز",
                    "آموزش رمزارز",
                    "صرافی رمزارز ایران",
                    "امنیت رمزارز",
                    "تک‌پی",''',
              '''      "آموزش رمزارز",
                    "تریدینگ آرنا",
                    "تمرین معامله با سرمایه مجازی",
                    "منتور هوشمند مالی",
                    "مدیریت ریسک",
                    "امنیت رمزارز",
                    "سواد مالی دیجیتال",
                    "تک‌پی",''',
          )
          replace_once(
              "src/app/layout.tsx",
              'title: "تک‌پی | صرافی رمزارز امن، سریع و شفاف",',
              'title: "تک‌پی | آموزش رمزارز و تمرین معاملاتی امن",',
          )
          replace_once(
              "src/app/layout.tsx",
              '"مشاهده قیمت لحظه‌ای رمزارزها، شروع سریع معامله، آموزش، امنیت حساب و پشتیبانی رسمی تک‌پی.",',
              '"آموزش رمزارز، تمرین در تریدینگ آرنا، منتور هوشمند و مسیر شفاف امنیت و مدیریت ریسک در تک‌پی.",',
          )
          replace_once(
              "src/app/layout.tsx",
              'title: "تک‌پی | صرافی رمزارز امن و حرفه‌ای",',
              'title: "تک‌پی | آموزش رمزارز و تریدینگ آرنا",',
          )
          replace_once(
              "src/app/layout.tsx",
              'description: "بازار رمزارز را با قیمت لحظه‌ای، امنیت، آموزش و مسیر شروع روشن دنبال کنید.",',
              'description: "با آموزش رمزارز، تمرین معاملاتی، منتور هوشمند و مدیریت ریسک برای ورود مسئولانه آماده شوید.",',
          )
          PY

      - name: Commit reviewed fixes and remove one-shot workflow
        run: |
          rm -f .github/workflows/browser-review-hardening.yml
          git config user.name "tecpey"
          git config user.email "actions@users.noreply.github.com"
          git add src/app/layout.tsx src/app/en/EnglishLandingClient.tsx src/app/home/enterprise/TecpeyEnterpriseLanding.tsx src/components/academy/GlobalAiMentorWidget.tsx src/components/academy/PublicMentorEntry.tsx .github/workflows/browser-review-hardening.yml
          git commit -m "fix(ui): enforce truthful and single-mentor public boundary"
          git push origin HEAD:fix/public-browser-golden-path
