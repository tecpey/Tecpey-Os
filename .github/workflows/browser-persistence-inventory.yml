name: Browser Persistence Inventory

on:
  pull_request:
    branches: [main]

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan source tree
        run: |
          {
            echo '# Browser persistence inventory'
            echo
            echo 'Generated from commit:' "$GITHUB_SHA"
            echo
            echo '## Direct references'
            grep -RInE \
              --include='*.ts' \
              --include='*.tsx' \
              --include='*.js' \
              --include='*.jsx' \
              '(localStorage|sessionStorage|indexedDB|window\.caches|caches\.)' \
              src || true
            echo
            echo '## Files'
            grep -RIlE \
              --include='*.ts' \
              --include='*.tsx' \
              --include='*.js' \
              --include='*.jsx' \
              '(localStorage|sessionStorage|indexedDB|window\.caches|caches\.)' \
              src | sort || true
          } > browser-persistence-inventory.txt
      - name: Upload inventory
        uses: actions/upload-artifact@v4
        with:
          name: browser-persistence-inventory
          path: browser-persistence-inventory.txt
          if-no-files-found: error
          retention-days: 1
