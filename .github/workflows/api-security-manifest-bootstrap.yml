name: API Security Manifest Bootstrap

on:
  push:
    branches: [fix/api-security-manifest]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: api-security-manifest-bootstrap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate complete mutating route inventory
        run: node scripts/generate-api-security-manifest.mjs --output=api-security-manifest.generated.json

      - name: Apply governed helper and alias contracts
        run: node scripts/postprocess-api-security-manifest.mjs --manifest=api-security-manifest.generated.json

      - name: Apply exact operation contracts
        run: node scripts/apply-api-security-operation-overrides.mjs --manifest=api-security-manifest.generated.json

      - name: Bootstrap committed baseline and debt registry
        run: node scripts/bootstrap-api-security-baseline.mjs --manifest=api-security-manifest.generated.json

      - name: Print inventory summary
        run: |
          node -e "const m=require('./api-security-manifest.generated.json'); console.log(JSON.stringify(m.totals,null,2))"

      - name: Upload generated manifest
        uses: actions/upload-artifact@v4
        with:
          name: api-security-manifest-bootstrap-${{ github.sha }}
          path: api-security-manifest.generated.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit exact baseline to bootstrap branch
        if: ${{ github.event_name == 'push' && github.ref_name == 'fix/api-security-manifest' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/security/generated/api-security-manifest.json config/api-security-exceptions.json
          if git diff --cached --quiet; then
            echo "Baseline already matches this exact head."
            exit 0
          fi
          git commit -m "chore(security): refresh API security baseline"
          git push origin HEAD:fix/api-security-manifest
