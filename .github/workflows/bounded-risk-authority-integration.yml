name: Bounded Risk Authority Integration

on:
  push:
    branches:
      - fix/risk-event-enforcement-evidence

permissions:
  contents: write

concurrency:
  group: bounded-risk-authority-integration
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/risk-event-enforcement-evidence

      - name: Apply exact bounded integration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              source = target.read_text()
              count = source.count(old)
              if count == 0 and new in source:
                  return
              if count != 1:
                  raise SystemExit(
                      f"bounded risk patch expected exactly one match in {path}, found {count}: {old!r}"
                  )
              target.write_text(source.replace(old, new, 1))

          replace_once(
              "src/lib/security/risk-enforcement-authority.ts",
              """    row.market === input.market &&
    row.desired_level === input.desired?.level &&
    (row.desired_expires_at?.toISOString() ?? null) ===
      (input.desired?.expiresAt.toISOString() ?? null) &&
    row.request_hash === input.requestHash""",
              """    row.market === input.market &&
    row.desired_level === input.desired?.level &&
    row.request_hash === input.requestHash""",
          )
          replace_once(
              "src/lib/security/risk-enforcement-authority.ts",
              """      desiredLevel: input.desired?.level ?? \"none\",
      desiredExpiresAt: input.desired?.expiresAt.toISOString() ?? null,""",
              """      desiredLevel: input.desired?.level ?? \"none\",""",
          )
          replace_once(
              "src/lib/security/risk-enforcement-authority.ts",
              """    desiredLevel: desired?.level ?? null,
    desiredExpiresAt: desired?.expiresAt.toISOString() ?? null,
    detectorFacts,""",
              """    desiredLevel: desired?.level ?? null,
    detectorFacts,""",
          )

          replace_once(
              "src/lib/security/sensitive-mutation-audit.ts",
              '  | "withdrawal.settle";',
              '''  | "withdrawal.settle"
  | "risk.event.record"
  | "risk.enforcement.apply"
  | "risk.enforcement.clear"
  | "risk.enforcement.expire";''',
          )
          replace_once(
              "src/lib/security/sensitive-mutation-audit.ts",
              '  | "withdrawal_settlement";',
              '''  | "withdrawal_settlement"
  | "risk_event"
  | "risk_enforcement";''',
          )

          replace_once(
              "src/lib/db-migration-plan.ts",
              'import { runAiMentorTrustMigrations } from "./db-migrate-ai-mentor-trust";',
              '''import { runAiMentorTrustMigrations } from "./db-migrate-ai-mentor-trust";
import { runRiskEnforcementAuthorityMigrations } from "./db-migrate-risk-enforcement-authority";''',
          )
          replace_once(
              "src/lib/db-migration-plan.ts",
              '''  await runWithdrawalExternalEffectGateAmountCastMigrations(client);
  await runSessionAuthorityMigrations(client);''',
              '''  await runWithdrawalExternalEffectGateAmountCastMigrations(client);
  await runRiskEnforcementAuthorityMigrations(client);
  await runSessionAuthorityMigrations(client);''',
          )

          replace_once(
              "src/app/api/orders/route.ts",
              '''    const tradeBlock = await enforceTradeAllowed(userId);
    if (tradeBlock) return apiError(tradeBlock, 403);
    checkOrderRisk({
      userId,
      market,
      ip: `principal:${userId}`,
      orderFingerprint: `${market}:${side}:${quantity}:${price ?? "market"}:${idempotencyKey}`,
    });''',
              '''    const tradeBlock = await enforceTradeAllowed(userId);
    if (tradeBlock === "risk_authority_unavailable") {
      return apiError(tradeBlock, 503);
    }
    if (tradeBlock) return apiError(tradeBlock, 403);
    const riskCheck = await checkOrderRisk({
      userId,
      market,
      ip: `principal:${userId}`,
      orderFingerprint: `${market}:${side}:${quantity}:${price ?? "market"}:${idempotencyKey}`,
    });
    if (!riskCheck.ok) return apiError(riskCheck.reason, 503);''',
          )
          PY

      - name: Commit exact integration
        run: |
          if git diff --quiet; then
            echo "No bounded integration change needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lib/security/risk-enforcement-authority.ts \
            src/lib/security/sensitive-mutation-audit.ts \
            src/lib/db-migration-plan.ts \
            src/app/api/orders/route.ts
          git commit -m "feat(risk): connect durable authority to financial gate"
          git push origin HEAD:fix/risk-event-enforcement-evidence
