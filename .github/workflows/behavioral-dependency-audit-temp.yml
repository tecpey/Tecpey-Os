name: Temporary Behavioral Refactor

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refactor:
    if: ${{ !contains(github.event.pull_request.head.sha, 'never-match') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/mentor-server-behavioral-20260718
          fetch-depth: 0

      - name: Apply exact server-fed behavioral refactor
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              if old not in source:
                  raise SystemExit(f"Expected block not found: {label}")
              return source.replace(old, new, 1)

          # Mentor V2: obtain the snapshot from the authenticated server endpoint
          # and stop submitting client-generated behavioral context.
          path = Path('src/components/academy/v2/MentorV2.tsx')
          source = path.read_text()
          source = replace_once(source,
              'import {\n  computeBehavioralSnapshot,\n  DIMENSION_LABELS,',
              'import {\n  DIMENSION_LABELS,',
              'Mentor import')
          source = replace_once(source,
              '} from "@/lib/behavioral-engine";\n',
              '} from "@/lib/behavioral-engine";\nimport { fetchBehavioralSnapshot } from "@/lib/behavioral-client";\n',
              'Mentor client import')
          source = replace_once(source,
              'function AskMentor({ snapshot }: { snapshot: BehavioralSnapshot }) {',
              'function AskMentor() {',
              'AskMentor signature')
          source = replace_once(source,
              '\n    const weakest = snapshot.weakestDimension;\n    const strongest = snapshot.strongestDimension;\n',
              '\n',
              'client snapshot variables')
          behavioral_context = '''          behavioralContext: {
            overallScore: snapshot.overallScore,
            weakestDimension: weakest ? DIMENSION_LABELS[weakest] : null,
            strongestDimension: strongest ? DIMENSION_LABELS[strongest] : null,
            learningVelocity: snapshot.learningVelocity,
            preferredStyle: snapshot.preferredLearningStyle,
            topWarnings: snapshot.dimensions
              .filter((d) => d.score < 50)
              .slice(0, 2)
              .map((d) => ({ dimension: DIMENSION_LABELS[d.dimension], message: d.explanation })),
          },
'''
          source = replace_once(source, behavioral_context, '', 'client behavioral payload')
          source = replace_once(source,
              '  }, [question, loading, snapshot]);',
              '  }, [question, loading]);',
              'AskMentor dependencies')
          old_state = '''  const [dueFlashcards, setDueFlashcards] = useState(0);
  const initialized = useRef(false);

  useEffect(() => {
    if (initialized.current) return;
    initialized.current = true;
    const snap = computeBehavioralSnapshot();
    const queue = buildSmartReviewQueue();
    const deck = loadDeck();
    setSnapshot(snap);
    setReviewQueue(queue.items.slice(0, 5));
    setDueFlashcards(getDueCards(deck).length);
  }, []);

  if (!snapshot) {
    return (
      <div className="flex h-64 items-center justify-center text-sm font-bold text-slate-500">
        در حال بارگذاری...
      </div>
    );
  }
'''
          new_state = '''  const [dueFlashcards, setDueFlashcards] = useState(0);
  const [snapshotError, setSnapshotError] = useState(false);
  const [reloadToken, setReloadToken] = useState(0);

  useEffect(() => {
    const controller = new AbortController();
    setSnapshotError(false);

    const queue = buildSmartReviewQueue();
    const deck = loadDeck();
    setReviewQueue(queue.items.slice(0, 5));
    setDueFlashcards(getDueCards(deck).length);

    void fetchBehavioralSnapshot("fa", controller.signal)
      .then(setSnapshot)
      .catch(() => {
        if (!controller.signal.aborted) setSnapshotError(true);
      });

    return () => controller.abort();
  }, [reloadToken]);

  if (!snapshot) {
    return (
      <div className="flex h-64 flex-col items-center justify-center gap-3 text-sm font-bold text-slate-500">
        {snapshotError ? (
          <>
            <span className="text-amber-300">دریافت تحلیل رفتاری از سرور انجام نشد.</span>
            <button
              type="button"
              onClick={() => setReloadToken((value) => value + 1)}
              className="rounded-xl border border-cyan-300/30 px-4 py-2 text-xs font-black text-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"
            >
              تلاش دوباره
            </button>
          </>
        ) : "در حال بارگذاری تحلیل امن سرور..."}
      </div>
    );
  }
'''
          source = replace_once(source, old_state, new_state, 'Mentor initialization')
          source = replace_once(source, '<AskMentor snapshot={snapshot} />', '<AskMentor />', 'AskMentor render')
          path.write_text(source)

          # Learning Insights: hydrate server-owned Academy state and fetch the
          # server-computed behavioral snapshot before rendering projections.
          path = Path('src/components/academy/v2/LearningInsightsDashboard.tsx')
          source = path.read_text()
          source = replace_once(source,
              'import { useEffect, useMemo, useRef, useState } from "react";',
              'import { useEffect, useMemo, useState } from "react";',
              'Insights React import')
          source = replace_once(source,
              'import {\n  computeBehavioralSnapshot,\n  DIMENSION_LABELS,',
              'import {\n  DIMENSION_LABELS,',
              'Insights behavioral import')
          source = replace_once(source,
              '} from "@/lib/behavioral-engine";\n',
              '} from "@/lib/behavioral-engine";\nimport { fetchBehavioralSnapshot } from "@/lib/behavioral-client";\n',
              'Insights client import')
          source = replace_once(source,
              'import { loadProgress } from "@/lib/academy-progress";',
              'import { hydrateProgress } from "@/lib/academy-progress";',
              'Insights progress import')
          source = replace_once(source,
              'import { loadDeck, getDueCards } from "@/lib/spaced-repetition";',
              'import { hydrateDeck, getDueCards } from "@/lib/spaced-repetition";',
              'Insights deck import')
          old_insights = '''  const [dueFlashcards, setDueFlashcards] = useState(0);
  const initialized = useRef(false);

  useEffect(() => {
    if (initialized.current) return;
    initialized.current = true;

    const snap = computeBehavioralSnapshot();
    const queue = buildSmartReviewQueue();
    const prog = loadProgress();
    const deck = loadDeck();
    const due = getDueCards(deck).length;

    setSnapshot(snap);
    setReviewQueue(queue);
    setProgress({ xp: prog.xp, level: prog.level, streak: prog.streak });
    setDueFlashcards(due);

    const timestamps = Object.values(prog.completedLessons).map((l) => l.completedAt);
    setCompletedAt(timestamps);

    // Simple concept status from module scores
    const mastered: string[] = [];
    const weak: string[] = [];
    // Map lesson scores to concept statuses
    for (const node of CONCEPT_NODES) {
      const lessonScore = Object.values(prog.moduleScores)[node.lessonIndex - 1] ?? 0;
      const lessonCompleted = Object.values(prog.completedLessons).some((l) => l.lessonId.includes(`l${node.lessonIndex}`));
      if (lessonCompleted) {
        if (lessonScore >= 80) mastered.push(node.id);
        else weak.push(node.id);
      }
    }
    setMasteredIds(mastered);
    setWeakIds(weak);
  }, []);

  if (!snapshot) {
    return (
      <div className="flex items-center justify-center h-64 text-slate-500 font-bold text-sm" aria-label="در حال بارگذاری">
        در حال بارگذاری داشبورد...
      </div>
    );
  }

  const coaching = generateCoachingReport(snapshot, dueFlashcards);
  const completedLessons = Object.keys(loadProgress().completedLessons).length;
'''
          new_insights = '''  const [dueFlashcards, setDueFlashcards] = useState(0);
  const [completedLessons, setCompletedLessons] = useState(0);
  const [loadError, setLoadError] = useState(false);
  const [reloadToken, setReloadToken] = useState(0);

  useEffect(() => {
    const controller = new AbortController();
    setLoadError(false);

    void Promise.all([
      fetchBehavioralSnapshot("fa", controller.signal),
      hydrateProgress("fa"),
      hydrateDeck("fa"),
    ]).then(([snap, prog, deck]) => {
      if (controller.signal.aborted) return;
      const queue = buildSmartReviewQueue();
      setSnapshot(snap);
      setReviewQueue(queue);
      setProgress({ xp: prog.xp, level: prog.level, streak: prog.streak });
      setDueFlashcards(getDueCards(deck).length);
      setCompletedLessons(Object.keys(prog.completedLessons).length);

      const timestamps = Object.values(prog.completedLessons).map((lesson) => lesson.completedAt);
      setCompletedAt(timestamps);

      const mastered: string[] = [];
      const weak: string[] = [];
      for (const node of CONCEPT_NODES) {
        const lessonScore = Object.values(prog.moduleScores)[node.lessonIndex - 1] ?? 0;
        const lessonCompleted = Object.values(prog.completedLessons)
          .some((lesson) => lesson.lessonId.includes(`l${node.lessonIndex}`));
        if (lessonCompleted) {
          if (lessonScore >= 80) mastered.push(node.id);
          else weak.push(node.id);
        }
      }
      setMasteredIds(mastered);
      setWeakIds(weak);
    }).catch(() => {
      if (!controller.signal.aborted) setLoadError(true);
    });

    return () => controller.abort();
  }, [reloadToken]);

  if (!snapshot) {
    return (
      <div className="flex h-64 flex-col items-center justify-center gap-3 text-sm font-bold text-slate-500" aria-label="در حال بارگذاری">
        {loadError ? (
          <>
            <span className="text-amber-300">دریافت داشبورد از سرور انجام نشد.</span>
            <button
              type="button"
              onClick={() => setReloadToken((value) => value + 1)}
              className="rounded-xl border border-cyan-300/30 px-4 py-2 text-xs font-black text-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"
            >
              تلاش دوباره
            </button>
          </>
        ) : "در حال بارگذاری داشبورد امن سرور..."}
      </div>
    );
  }

  const coaching = generateCoachingReport(snapshot, dueFlashcards);
'''
          source = replace_once(source, old_insights, new_insights, 'Insights initialization')
          path.write_text(source)

          # Instructor view: only the consented student can fetch their server
          # snapshot. Existing legacy community/Arena data is left for later PRs.
          path = Path('src/components/academy/community/InstructorDashboard.tsx')
          source = path.read_text()
          source = replace_once(source,
              'import { computeBehavioralSnapshot, DIMENSION_LABELS } from "@/lib/behavioral-engine";',
              'import { DIMENSION_LABELS, type BehavioralSnapshot } from "@/lib/behavioral-engine";\nimport { fetchBehavioralSnapshot } from "@/lib/behavioral-client";',
              'Instructor import')
          source = replace_once(source,
              '''function ConsentedView() {
  const snapshot = computeBehavioralSnapshot();
  const scores = computeMyLeaderboardScores();''',
              '''function ConsentedView() {
  const [snapshot, setSnapshot] = useState<BehavioralSnapshot | null>(null);
  const [loadError, setLoadError] = useState(false);
  const [reloadToken, setReloadToken] = useState(0);

  useEffect(() => {
    const controller = new AbortController();
    setLoadError(false);
    void fetchBehavioralSnapshot("fa", controller.signal)
      .then(setSnapshot)
      .catch(() => {
        if (!controller.signal.aborted) setLoadError(true);
      });
    return () => controller.abort();
  }, [reloadToken]);

  if (!snapshot) {
    return (
      <div className="flex h-48 flex-col items-center justify-center gap-3 text-sm font-bold text-slate-500">
        {loadError ? (
          <>
            <span className="text-amber-300">دریافت نمای رفتاری از سرور انجام نشد.</span>
            <button
              type="button"
              onClick={() => setReloadToken((value) => value + 1)}
              className="rounded-xl border border-cyan-300/30 px-4 py-2 text-xs font-black text-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"
            >
              تلاش دوباره
            </button>
          </>
        ) : "در حال دریافت نمای مجاز از سرور..."}
      </div>
    );
  }

  const scores = computeMyLeaderboardScores();''',
              'Instructor consented view')
          path.write_text(source)

          # Canonical Mentor route: compute the context on the server and never
          # trust behavioral fields supplied by a browser request.
          path = Path('src/app/api/ai-mentor/route.ts')
          source = path.read_text()
          source = replace_once(source,
              'import { withObservability } from "@/lib/observe";\n',
              'import { withObservability } from "@/lib/observe";\nimport { computeBehavioralSnapshot } from "@/lib/behavioral-engine";\nimport { buildBehavioralPrompt, collectBehavioralInputs } from "@/lib/behavioral-context-server";\n',
              'Mentor API imports')
          source = replace_once(source,
              '''    const [mentorCtx] = await Promise.all([
      studentId ? getMentorContext(studentId) : Promise.resolve(null),
      studentId ? getOrCreateMentorProfile(studentId) : Promise.resolve(null),
    ]);''',
              '''    const [mentorCtx, behavioralInputs] = await Promise.all([
      studentId ? getMentorContext(studentId) : Promise.resolve(null),
      studentId ? collectBehavioralInputs(studentId, locale === "en" ? "en" : "fa") : Promise.resolve(null),
      studentId ? getOrCreateMentorProfile(studentId) : Promise.resolve(null),
    ]);
    const behavioralSnapshot = behavioralInputs
      ? computeBehavioralSnapshot(behavioralInputs)
      : null;''',
              'Mentor API context load')
          source = replace_once(source,
              '    const contextBlock = mentorCtx ? buildContextPrompt(mentorCtx) : "";\n',
              '    const contextBlock = mentorCtx ? buildContextPrompt(mentorCtx) : "";\n    const behavioralBlock = behavioralSnapshot ? buildBehavioralPrompt(behavioralSnapshot) : "";\n',
              'Mentor API context block')
          source = replace_once(source,
              '      contextBlock ? `\\nاطلاعات شخصی‌سازی‌شده کاربر (از پایگاه داده):\\n${contextBlock}` : "",\n',
              '      contextBlock ? `\\nاطلاعات شخصی‌سازی‌شده کاربر (از پایگاه داده):\\n${contextBlock}` : "",\n      behavioralBlock ? `\\nنمای رفتاری محاسبه‌شده روی سرور:\\n${behavioralBlock}` : "",\n',
              'Mentor API behavioral prompt')
          path.write_text(source)

          # Lower the reviewed CI debt baseline in the same change.
          baseline = Path('scripts/check-browser-persistence.mjs')
          source = baseline.read_text()
          source = replace_once(source,
              '  "src/lib/behavioral-engine.ts": 9,\n',
              '',
              'browser persistence baseline')
          baseline.write_text(source)

          checks = {
              'MentorV2 still computes client snapshot': 'computeBehavioralSnapshot' in Path('src/components/academy/v2/MentorV2.tsx').read_text(),
              'Insights still computes client snapshot': 'computeBehavioralSnapshot' in Path('src/components/academy/v2/LearningInsightsDashboard.tsx').read_text(),
              'Instructor still computes client snapshot': 'computeBehavioralSnapshot' in Path('src/components/academy/community/InstructorDashboard.tsx').read_text(),
              'Mentor still submits client context': 'behavioralContext' in Path('src/components/academy/v2/MentorV2.tsx').read_text(),
              'Behavioral engine still accesses browser storage': 'localStorage' in Path('src/lib/behavioral-engine.ts').read_text(),
          }
          failures = [label for label, failed in checks.items() if failed]
          if failures:
              raise SystemExit('; '.join(failures))

          Path('.github/workflows/behavioral-dependency-audit-temp.yml').unlink()
          PY

      - name: Commit refactor and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/academy/v2/MentorV2.tsx \
                  src/components/academy/v2/LearningInsightsDashboard.tsx \
                  src/components/academy/community/InstructorDashboard.tsx \
                  src/app/api/ai-mentor/route.ts \
                  scripts/check-browser-persistence.mjs \
                  .github/workflows/behavioral-dependency-audit-temp.yml
          git commit -m "refactor(mentor): consume server behavioral intelligence"
          git push origin HEAD:refactor/mentor-server-behavioral-20260718
