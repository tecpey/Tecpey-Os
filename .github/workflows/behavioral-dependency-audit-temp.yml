name: Temporary Behavioral Dependency Audit

on:
  pull_request:
    branches: [main]

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Map behavioral engine consumers
        run: |
          grep -RInE --exclude-dir=.git --exclude-dir=node_modules \
            '(behavioral-engine|computeBehavioralSnapshot|loadOrComputeSnapshot|getDimensionScore|collectTradingDNASignals)' \
            src > behavioral-dependency-inventory.txt || true
          cat behavioral-dependency-inventory.txt
      - uses: actions/upload-artifact@v4
        with:
          name: behavioral-dependency-inventory
          path: behavioral-dependency-inventory.txt
          if-no-files-found: error
          retention-days: 1
