name: Temporary Behavioral Source Export

on:
  pull_request:
    branches: [main]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: behavioral-source-files
          path: |
            src/lib/behavioral-engine.ts
            src/components/academy/v2/MentorV2.tsx
            src/components/academy/v2/LearningInsightsDashboard.tsx
            src/components/academy/community/InstructorDashboard.tsx
            src/app/api/ai-mentor/route.ts
          if-no-files-found: error
          retention-days: 1
