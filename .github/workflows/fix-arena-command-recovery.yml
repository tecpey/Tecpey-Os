name: Fix Arena Command Recovery — Never Merge

on:
  push:
    branches:
      - feat/trading-arena-authoritative-ui-v2

permissions:
  contents: write

concurrency:
  group: fix-arena-command-recovery
  cancel-in-progress: true

jobs:
  fix:
    name: Apply Arena unresolved-command recovery fix
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout exact feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/trading-arena-authoritative-ui-v2
          fetch-depth: 0

      - name: Apply asserted source corrections
        run: python scripts/_apply_arena_command_recovery.py

      - name: Verify authority boundaries
        run: |
          node scripts/check-arena-ui-authority.mjs
          node --check scripts/check-arena-ui-authority.mjs
          git diff --check

      - name: Commit product fix and remove transport files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/fix-arena-command-recovery.yml \
                 scripts/_apply_arena_command_recovery.py \
                 .github/ARENA_COMMAND_RECOVERY_TRIGGER
          git add src/lib/trading-arena-client.ts \
                  src/components/academy/trading-arena/TradingArenaExecutionClient.tsx \
                  src/tests/arena/client-authority.test.ts \
                  scripts/check-arena-ui-authority.mjs
          git diff --cached --check
          git commit -m 'fix(arena): preserve unresolved command identity across polling'
          git push origin HEAD:feat/trading-arena-authoritative-ui-v2
