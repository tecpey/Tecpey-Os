name: Temporary Arena Lint Cleanup

on:
  push:
    branches:
      - feat/trading-arena-server-state-20260718

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ !contains(github.event.head_commit.message, 'remove unused Arena icon import') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/trading-arena-server-state-20260718
          fetch-depth: 0
      - name: Remove unused import and temporary workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          component = Path('src/components/academy/TradingArenaProClient.tsx')
          source = component.read_text()
          target = '  BarChart3,\n'
          if target not in source:
              raise SystemExit('Unused BarChart3 import was not found')
          component.write_text(source.replace(target, '', 1))
          Path('.github/workflows/arena-lint-fix-temp.yml').unlink()
          PY
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(arena): remove unused Arena icon import"
          git push origin HEAD:feat/trading-arena-server-state-20260718
