name: Remove Unused Lucide — Never Merge

on:
  push:
    branches:
      - chore/remove-unused-lucide-20260719

permissions:
  contents: write

concurrency:
  group: remove-unused-lucide
  cancel-in-progress: true

jobs:
  remove:
    name: Remove unowned lucide dependency
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout exact cleanup branch
        uses: actions/checkout@v4
        with:
          ref: chore/remove-unused-lucide-20260719
          fetch-depth: 0

      - name: Setup governed Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify governed npm version
        run: |
          test "$(npm --version | cut -d. -f1)" = "10"

      - name: Install exact dependency graph
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Remove direct lucide dependency
        run: npm uninstall lucide --save --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Verify dependency ownership result
        run: |
          node - <<'NODE'
          const pkg = require('./package.json');
          if (pkg.dependencies?.lucide || pkg.devDependencies?.lucide) {
            throw new Error('lucide_direct_dependency_still_present');
          }
          if (!pkg.dependencies?.['lucide-react']) {
            throw new Error('lucide_react_must_remain');
          }
          NODE
          node scripts/audit-repository-hygiene.mjs --json > /tmp/hygiene.json
          node - <<'NODE'
          const report = require('/tmp/hygiene.json');
          const names = report.unreferencedDependencies.map((item) => item.name);
          if (names.includes('lucide')) throw new Error('lucide_still_in_hygiene_inventory');
          NODE
          git diff --check

      - name: Commit lockfile-safe dependency removal and delete transport workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/remove-unused-lucide.yml
          git add package.json package-lock.json
          git diff --cached --check
          git commit -m 'chore(deps): remove unused lucide package'
          git push origin HEAD:chore/remove-unused-lucide-20260719
