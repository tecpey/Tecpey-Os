name: Deliver Academy Server Progression — Never Merge

on:
  push:
    branches:
      - delivery/academy-server-issued-progression-20260719
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  deliver:
    name: Verify and deliver reviewed Academy patch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout delivery payload
        uses: actions/checkout@v4
        with:
          ref: delivery/academy-server-issued-progression-20260719
          path: payload

      - name: Checkout target feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/academy-server-issued-progression
          path: work
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild payload
        shell: bash
        run: |
          set -euo pipefail
          cat \
            payload/delivery/academy-server-issued-progression/part-000 \
            payload/delivery/academy-server-issued-progression/part-001 \
            payload/delivery/academy-server-issued-progression/part-002 \
            payload/delivery/academy-server-issued-progression/part-003-00 \
            payload/delivery/academy-server-issued-progression/part-003-01 \
            payload/delivery/academy-server-issued-progression/part-003-02 \
            payload/delivery/academy-server-issued-progression/part-003-03 \
            payload/delivery/academy-server-issued-progression/part-003-04 \
            payload/delivery/academy-server-issued-progression/part-003-05 \
            payload/delivery/academy-server-issued-progression/part-004 \
            payload/delivery/academy-server-issued-progression/part-005 \
            payload/delivery/academy-server-issued-progression/part-006-00 \
            payload/delivery/academy-server-issued-progression/part-006-01 \
            payload/delivery/academy-server-issued-progression/part-006-02 \
            payload/delivery/academy-server-issued-progression/part-006-03 \
            payload/delivery/academy-server-issued-progression/part-006-04 \
            payload/delivery/academy-server-issued-progression/part-006-05 \
            payload/delivery/academy-server-issued-progression/part-007 \
            payload/delivery/academy-server-issued-progression/part-008 \
            | base64 --decode > academy-patch.tgz
          sha256sum academy-patch.tgz | tee academy-patch.sha256
          tar -tzf academy-patch.tgz | sort | tee archive-files.txt

      - name: Verify checksum and exact file scope
        shell: bash
        run: |
          set -euo pipefail
          echo '1bc944df38f018ee8343c24833198c6cd4f0a37ab2abeceaf5e738feec2ab2fd  academy-patch.tgz' | sha256sum --check --strict
          cat > expected-files.txt <<'EOF'
          .github/workflows/ci.yml
          docs/academy/ACADEMY_PROGRESS_AUTHORITY_MIGRATION_REPORT.md
          scripts/check-academy-authority-boundary.mjs
          src/app/api/academy-lesson-assessment/route.ts
          src/app/api/academy-lesson-progress/route.ts
          src/app/api/academy-state/route.ts
          src/app/api/academy-term-progress/route.ts
          src/components/academy/v2/FlashcardDeck.tsx
          src/components/academy/v2/LessonPlayerV2.tsx
          src/components/academy/v2/QuizEngineV2.tsx
          src/lib/academy-assessment.ts
          src/lib/academy-authority.ts
          src/lib/academy-progress-projection.ts
          src/lib/academy-progress.ts
          src/lib/academy-reward-policy.ts
          src/lib/db-migrate-user-state.ts
          src/tests/academy/assessment-authority.test.ts
          src/tests/academy/authority-migration.test.ts
          src/tests/academy/progress-state.test.ts
          EOF
          sort -o expected-files.txt expected-files.txt
          diff -u expected-files.txt archive-files.txt
          grep -v '^\.github/workflows/ci.yml$' expected-files.txt > push-files.txt

      - name: Apply payload and run dependency-free authority guard
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf academy-patch.tgz -C work
          cd work
          node scripts/check-academy-authority-boundary.mjs

      - name: Prepare exact product commit
        id: prepare_commit
        shell: bash
        run: |
          set +e
          {
            cd work
            git config user.name 'tecpey-delivery-bot'
            git config user.email 'actions@users.noreply.github.com'
            while IFS= read -r file; do git add -- "$file"; done < ../push-files.txt
            git diff --cached --name-only | sort > ../staged-files.txt
            diff -u ../push-files.txt ../staged-files.txt
            test -n "$(git diff --cached --name-only)"
            git status --short
            git commit -m 'feat(academy): make progression and rewards server-issued'
            git rev-parse HEAD | tee ../prepared-commit.txt
          } > commit-diagnostics.txt 2>&1
          status=$?
          echo "$status" > commit-status.txt
          cat commit-diagnostics.txt
          exit 0

      - name: Upload commit diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: academy-commit-diagnostics
          path: |
            commit-diagnostics.txt
            commit-status.txt
            prepared-commit.txt
            staged-files.txt
            push-files.txt
          if-no-files-found: warn
          retention-days: 1

      - name: Require valid prepared commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat commit-status.txt)" = '0'
          test -s prepared-commit.txt

      - name: Push product commit
        shell: bash
        run: |
          set +e
          {
            cd work
            git push origin HEAD:agent/academy-server-issued-progression
          } > push-diagnostics.txt 2>&1
          status=$?
          echo "$status" > push-status.txt
          cat push-diagnostics.txt
          exit 0

      - name: Upload push diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: academy-push-diagnostics
          path: |
            push-diagnostics.txt
            push-status.txt
          if-no-files-found: error
          retention-days: 1

      - name: Require successful product push
        shell: bash
        run: test "$(cat push-status.txt)" = '0'

      - name: Delivery branch safety notice
        run: echo 'NEVER MERGE this delivery workflow or payload branch into main.'
