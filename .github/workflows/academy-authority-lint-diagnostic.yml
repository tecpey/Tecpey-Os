name: Academy Authority Lint Fix — Never Merge

on:
  push:
    branches:
      - feat/academy-server-reward-authority

permissions:
  contents: write

concurrency:
  group: academy-authority-lint-fix
  cancel-in-progress: true

jobs:
  fix:
    name: Apply verified Next.js lint rename
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: feat/academy-server-reward-authority
          fetch-depth: 0

      - name: Apply exact lint correction
        shell: bash
        run: |
          set -euo pipefail
          file='src/lib/academy-progress-authority.ts'
          before='for (const module of TERM1.modules) {'
          after='for (const moduleEntry of TERM1.modules) {'

          test "$(grep -Fxc "$before" "$file")" = '1'
          test "$(grep -Fxc '    const lesson = module.lessons.find((item) => item.id === lessonId);' "$file")" = '1'

          python - <<'PY'
          from pathlib import Path
          path = Path('src/lib/academy-progress-authority.ts')
          source = path.read_text()
          source = source.replace(
              'for (const module of TERM1.modules) {\n    const lesson = module.lessons.find((item) => item.id === lessonId);',
              'for (const moduleEntry of TERM1.modules) {\n    const lesson = moduleEntry.lessons.find((item) => item.id === lessonId);',
              1,
          )
          path.write_text(source)
          PY

          test "$(grep -Fxc "$after" "$file")" = '1'
          test "$(grep -Fxc '    const lesson = moduleEntry.lessons.find((item) => item.id === lessonId);' "$file")" = '1'
          ! grep -Fq 'for (const module of TERM1.modules)' "$file"
          git diff --check

      - name: Commit source-only correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/lib/academy-progress-authority.ts
          git diff --cached --check
          git commit -m 'fix(academy): avoid reserved module binding'
          git push origin HEAD:feat/academy-server-reward-authority
