name: Academy Authority Lint Diagnostic — Never Merge

on:
  push:
    branches:
      - feat/academy-server-reward-authority
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: academy-authority-lint-diagnostic
  cancel-in-progress: true

jobs:
  diagnostic:
    name: Capture complete ESLint evidence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Capture ESLint output
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          ./node_modules/.bin/eslint . --max-warnings 0 > /tmp/academy-authority-eslint.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/academy-authority-eslint.status
          cat /tmp/academy-authority-eslint.log
          exit "$status"

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academy-authority-eslint-diagnostic
          path: |
            /tmp/academy-authority-eslint.log
            /tmp/academy-authority-eslint.status
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failing status
        if: steps.lint.outcome == 'failure'
        run: exit 1
