name: Academy Authority Lint Fix — Never Merge

on:
  push:
    branches:
      - feat/academy-server-reward-authority
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: academy-authority-lint-fix
  cancel-in-progress: true

jobs:
  fix:
    name: Apply verified Next.js lint rename
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'feat/academy-server-reward-authority')
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: feat/academy-server-reward-authority
          fetch-depth: 0

      - name: Apply exact lint correction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/academy-progress-authority.ts')
          source = path.read_text()
          before = 'for (const module of TERM1.modules) {\n    const lesson = module.lessons.find((item) => item.id === lessonId);'
          after = 'for (const moduleEntry of TERM1.modules) {\n    const lesson = moduleEntry.lessons.find((item) => item.id === lessonId);'

          assert source.count(before) == 1, 'expected exactly one original module binding'
          assert after not in source, 'replacement already present before verified change'
          updated = source.replace(before, after, 1)
          assert updated.count(before) == 0, 'original module binding still present'
          assert updated.count(after) == 1, 'replacement binding was not created exactly once'
          path.write_text(updated)
          PY
          git diff --check

      - name: Commit source-only correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/lib/academy-progress-authority.ts
          git diff --cached --check
          git commit -m 'fix(academy): avoid reserved module binding'
          git push origin HEAD:feat/academy-server-reward-authority
