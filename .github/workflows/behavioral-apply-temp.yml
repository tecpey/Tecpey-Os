name: Temporary Behavioral Patch Apply

on:
  push:
    branches:
      - refactor/mentor-server-behavioral-20260718

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'consume server behavioral intelligence') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/mentor-server-behavioral-20260718
          fetch-depth: 0

      - name: Apply reviewed source patch
        run: |
          base64 --decode .github/behavioral-ui.patch.gz.b64 | gzip --decompress > /tmp/behavioral-ui.patch
          git apply --check /tmp/behavioral-ui.patch
          git apply /tmp/behavioral-ui.patch
          python - <<'PY'
          from pathlib import Path
          baseline = Path('scripts/check-browser-persistence.mjs')
          source = baseline.read_text()
          target = '  "src/lib/behavioral-engine.ts": 9,\n'
          if target not in source:
              raise SystemExit('Behavioral Engine persistence baseline was not found')
          baseline.write_text(source.replace(target, '', 1))

          for path in [
              Path('.github/behavioral-ui.patch.gz.b64'),
              Path('.github/behavioral-refactor-trigger.txt'),
              Path('.github/workflows/behavioral-dependency-audit-temp.yml'),
              Path('.github/workflows/behavioral-apply-temp.yml'),
          ]:
              if path.exists():
                  path.unlink()
          PY

      - name: Verify targeted invariants
        run: |
          ! grep -RIn 'computeBehavioralSnapshot()' \
            src/components/academy/v2/MentorV2.tsx \
            src/components/academy/v2/LearningInsightsDashboard.tsx \
            src/components/academy/community/InstructorDashboard.tsx
          ! grep -n 'behavioralContext' src/components/academy/v2/MentorV2.tsx
          ! grep -n 'localStorage' src/lib/behavioral-engine.ts
          grep -n 'collectBehavioralInputs' src/app/api/ai-mentor/route.ts

      - name: Commit server-fed consumers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(mentor): consume server behavioral intelligence"
          git push origin HEAD:refactor/mentor-server-behavioral-20260718
