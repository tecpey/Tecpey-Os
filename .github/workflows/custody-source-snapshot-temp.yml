name: Temporary Custody Source Snapshot

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/custody-source-snapshot-temp.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect custody trust boundaries
        run: |
          set -euo pipefail
          mkdir -p snapshot/src snapshot/scripts snapshot/docs snapshot/config
          cp package.json server.ts snapshot/
          cp -R src/lib/wallet snapshot/src/lib-wallet
          cp -R src/workers snapshot/src/workers
          cp -R src/app/api/auth/withdraw snapshot/src/api-auth-withdraw
          cp -R src/app/api/wallet snapshot/src/api-wallet 2>/dev/null || true
          cp scripts/validate-env.mjs scripts/check-withdrawal-runtime-authority.mjs scripts/check-withdrawal-admission-authority.mjs snapshot/scripts/
          cp -R src/tests/wallet snapshot/src/tests-wallet 2>/dev/null || true
          cp -R src/tests/security snapshot/src/tests-security
          find docs -maxdepth 3 -type f \( -iname '*wallet*' -o -iname '*withdraw*' -o -iname '*custody*' \) -exec cp --parents {} snapshot/ \;
          git rev-parse HEAD > snapshot/HEAD_SHA.txt
      - uses: actions/upload-artifact@v4
        with:
          name: custody-source-${{ github.sha }}
          path: snapshot
          if-no-files-found: error
          retention-days: 2
