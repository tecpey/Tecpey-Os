name: API Security Manifest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: api-security-manifest-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Mutating API Security Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/risk-event-enforcement-evidence

      - name: Apply exact risk replay patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/lib/security/risk-enforcement-authority.ts")
          source = path.read_text()
          replacements = [
              (
                  """    row.desired_level === input.desired?.level &&
    (row.desired_expires_at?.toISOString() ?? null) ===
      (input.desired?.expiresAt.toISOString() ?? null) &&
    row.request_hash === input.requestHash""",
                  """    row.desired_level === (input.desired?.level ?? null) &&
    row.request_hash === input.requestHash""",
              ),
              (
                  """      desiredLevel: input.desired?.level ?? \"none\",
      desiredExpiresAt: input.desired?.expiresAt.toISOString() ?? null,""",
                  """      desiredLevel: input.desired?.level ?? \"none\",""",
              ),
              (
                  """    desiredLevel: desired?.level ?? null,
    desiredExpiresAt: desired?.expiresAt.toISOString() ?? null,
    detectorFacts,""",
                  """    desiredLevel: desired?.level ?? null,
    detectorFacts,""",
              ),
          ]
          changed = False
          for old, new in replacements:
              count = source.count(old)
              if count == 1:
                  source = source.replace(old, new, 1)
                  changed = True
              elif count == 0 and new in source:
                  continue
              else:
                  raise SystemExit(
                      f"bounded replay patch expected one match, found {count}: {old!r}"
                  )
          if changed:
              path.write_text(source)
          PY

          if git diff --quiet -- src/lib/security/risk-enforcement-authority.ts; then
            echo "Replay patch already applied."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/lib/security/risk-enforcement-authority.ts
            git commit -m "fix(risk): make detector replay identity time-stable"
            git push origin HEAD:fix/risk-event-enforcement-evidence
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Verify npm version
        run: |
          NPM_MAJOR=$(npm --version | cut -d. -f1)
          if [ "$NPM_MAJOR" != "10" ]; then
            echo "ERROR: npm major version must be 10. Got: $(npm --version)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Verify exact manifest and governed exceptions
        id: manifest-policy
        shell: bash
        run: |
          mkdir -p artifacts/api-security-manifest
          set +e
          npm run api:security:check 2>&1 | tee artifacts/api-security-manifest/check.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Run manifest policy and response-cache tests
        if: ${{ always() }}
        run: npm run test:api-security-manifest

      - name: Generate exact diagnostic manifest
        if: ${{ failure() }}
        run: |
          node scripts/generate-api-security-manifest.mjs --output=artifacts/api-security-manifest/api-security-manifest.diagnostic.json
          node scripts/postprocess-api-security-manifest.mjs --manifest=artifacts/api-security-manifest/api-security-manifest.diagnostic.json
          node scripts/apply-api-security-operation-overrides.mjs --manifest=artifacts/api-security-manifest/api-security-manifest.diagnostic.json

      - name: Upload manifest diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-security-manifest-diagnostics-${{ github.sha }}
          path: artifacts/api-security-manifest/**
          if-no-files-found: error
          retention-days: 7
