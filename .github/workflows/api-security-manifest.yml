name: API Security Manifest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: api-security-manifest-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Mutating API Security Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Verify npm version
        run: |
          NPM_MAJOR=$(npm --version | cut -d. -f1)
          if [ "$NPM_MAJOR" != "10" ]; then
            echo "ERROR: npm major version must be 10. Got: $(npm --version)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Verify exact manifest and governed exceptions
        id: manifest-policy
        run: npm run api:security:check

      - name: Run manifest policy and response-cache tests
        if: ${{ always() }}
        run: npm run test:api-security-manifest

      - name: Generate exact diagnostic manifest
        if: ${{ failure() }}
        run: |
          node scripts/generate-api-security-manifest.mjs --output=api-security-manifest.diagnostic.json
          node scripts/postprocess-api-security-manifest.mjs --manifest=api-security-manifest.diagnostic.json
          node scripts/apply-api-security-operation-overrides.mjs --manifest=api-security-manifest.diagnostic.json

      - name: Upload manifest diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-security-manifest-diagnostics-${{ github.sha }}
          path: api-security-manifest.diagnostic.json
          if-no-files-found: error
          retention-days: 7
