name: Browser Navigation Copy Fix

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/browser-nav-copy-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    name: Apply browser-discovered navigation and copy fixes
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - name: Apply staged fixes
        run: python3 scripts/apply-browser-nav-copy-fixes.py
      - name: Commit non-workflow fixes
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git checkout HEAD -- .github/workflows/browser-nav-copy-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ui): correct public auth links and availability copy"
          git push origin "HEAD:${HEAD_REF}"
