name: Temporary Bounded Body Source Snapshot

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/bounded-body-source-snapshot-temp.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect affected route sources
        run: |
          set -euo pipefail
          mkdir -p snapshot/src/app/api snapshot/src/lib snapshot/scripts snapshot/config snapshot/docs/security/generated
          cp -R src/app/api snapshot/src/app/
          cp src/lib/api-validation.ts src/lib/observe.ts src/lib/auth-session.ts snapshot/src/lib/
          cp scripts/api-security-body-limit-policy.mjs scripts/api-security-body-boundary.mjs scripts/api-security-runtime-evidence.mjs scripts/generate-api-security-manifest.mjs snapshot/scripts/
          cp config/api-security-exceptions.json snapshot/config/
          cp docs/security/generated/api-security-manifest.json snapshot/docs/security/generated/
          cp package.json tsconfig.json snapshot/
          git rev-parse HEAD > snapshot/HEAD_SHA.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bounded-body-source-${{ github.sha }}
          path: snapshot
          if-no-files-found: error
          retention-days: 2
