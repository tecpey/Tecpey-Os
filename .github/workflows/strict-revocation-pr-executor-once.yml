name: One-shot Strict Revocation PR Executor

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/strict-revocation-pr-executor-once.yml

permissions:
  contents: write

concurrency:
  group: one-shot-strict-revocation-pr-executor
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: fix/strict-revocation-high-risk-mutations
          fetch-depth: 2

      - name: Align community patch with current authority
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("scripts/apply-strict-revocation-once.py")
          source = path.read_text()
          start = source.index('career_path = "src/lib/community-career.ts"')
          end = source.index('runtime_path = "scripts/api-security-runtime-evidence.mjs"')
          replacement = '''career_path = "src/lib/community-career.ts"
          career = read(career_path)
          if "export async function setPublicVisibilityForStudent" not in career:
              marker = "export async function getCurrentPublicProfile(req: NextRequest): Promise<PublicLearnerProfile | null> {"
              if marker not in career:
                  raise SystemExit("community setter insertion marker missing")
              addition = \'\'\'export async function setPublicVisibilityForStudent(
            studentId: string,
            visibility: "public" | "private",
          ): Promise<"updated" | "not_found" | "unavailable"> {
            const result = await withDb(async (client) => {
              const updated = await client.query(
                `INSERT INTO academy_public_profiles(student_id, visibility, updated_at)
                 VALUES($1::uuid, $2, now())
                 ON CONFLICT(student_id) DO UPDATE
                   SET visibility = EXCLUDED.visibility, updated_at = now()
                 RETURNING student_id`,
                [studentId, visibility],
              );
              return (updated.rowCount ?? 0) === 1;
            }).catch(() => ({ enabled: false as const, value: null }));
            if (!result.enabled) return "unavailable";
            return result.value ? "updated" : "not_found";
          }

          \'\'\'
              career = career.replace(marker, addition + marker, 1)
          write(career_path, career)

          write(
              "src/app/api/community/profile/route.ts",
              \'\'\'import { verifyCsrfOrigin } from "@/lib/csrf";
          import { NextRequest } from "next/server";
          import { rateLimit } from "@/lib/rate-limit";
          import { getCanonicalSession } from "@/lib/auth-session";
          import {
            getCurrentPublicProfile,
            getPublicProfile,
            setPublicVisibilityForStudent,
          } from "@/lib/community-career";
          import { apiOk, apiError } from "@/lib/api-validation";
          import { withObservability } from "@/lib/observe";

          export async function GET(req: NextRequest) {
            return withObservability(req, { route: "/api/community/profile" }, async () => {
              const limit = await rateLimit(req, {
                namespace: "community-profile-read",
                limit: 120,
                windowMs: 60_000,
              });
              if (!limit.ok) return apiError("rate_limited", 429);
              const id = new URL(req.url).searchParams.get("id");
              const profile = id ? await getPublicProfile(id) : await getCurrentPublicProfile(req);
              return apiOk({ authenticated: Boolean(profile), profile });
            });
          }

          export async function PATCH(req: NextRequest) {
            return withObservability(req, { route: "/api/community/profile" }, async () => {
              if (!verifyCsrfOrigin(req)) return apiError("forbidden", 403);
              const session = await getCanonicalSession(req, { strictRevocation: true });
              if (!session.studentId) return apiError("academy_profile_required", 401);
              const limit = await rateLimit(req, {
                namespace: "community-profile-write",
                identity: session.studentId,
                limit: 30,
                windowMs: 60_000,
              });
              if (!limit.ok) return apiError("rate_limited", 429);
              const body = await req.json().catch(() => ({}));
              const visibility = body.visibility === "private" ? "private" : "public";
              const updated = await setPublicVisibilityForStudent(
                session.studentId,
                visibility,
              );
              if (updated === "unavailable") {
                return apiError("profile_storage_unavailable", 503);
              }
              if (updated === "not_found") return apiError("profile_not_found", 404);
              return apiOk({ visibility });
            });
          }
          \'\'\',
          )

          '''
          path.write_text(source[:start] + replacement + source[end:])
          PY

      - name: Apply reviewed remediation directly
        run: python3 scripts/apply-strict-revocation-once.py

      - name: Capture strict revocation authority diagnostics
        id: authority
        continue-on-error: true
        run: node scripts/check-strict-revocation-authority.mjs > strict-revocation-authority.log 2>&1

      - name: Upload strict revocation authority diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-revocation-authority-${{ github.sha }}
          path: strict-revocation-authority.log
          if-no-files-found: error
          retention-days: 2

      - name: Enforce strict revocation authority result
        if: steps.authority.outcome != 'success'
        run: |
          cat strict-revocation-authority.log
          exit 1

      - name: Verify strict revocation evidence detector
        run: node --test scripts/api-security-strict-revocation-evidence.test.mjs

      - name: Verify clean patch
        run: git diff --check

      - name: Commit permanent remediation and remove temporary executors
        run: |
          set -euo pipefail
          test -n "$(git status --short)"
          git rm \
            .github/workflows/strict-revocation-remediation-once.yml \
            .github/workflows/strict-revocation-pr-executor-once.yml \
            scripts/apply-strict-revocation-once.py
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(security): require strict revocation on high-risk mutations"
          git push origin HEAD:fix/strict-revocation-high-risk-mutations
