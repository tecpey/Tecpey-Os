name: Temporary Arena Dashboard Patch Apply

on:
  push:
    branches:
      - feat/trading-arena-execution-state-20260718

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'connect Dashboard to server execution state') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/trading-arena-execution-state-20260718
          fetch-depth: 0

      - name: Apply reviewed Dashboard patch
        run: |
          base64 --decode .github/arena-dashboard.patch.gz.b64 | gzip --decompress > /tmp/arena-dashboard.patch
          git apply --check /tmp/arena-dashboard.patch
          git apply /tmp/arena-dashboard.patch
          rm -f .github/arena-dashboard.patch.gz.b64
          rm -f .github/workflows/arena-dashboard-apply-temp.yml
          rm -f .github/workflows/arena-execution-source-temp.yml

      - name: Verify browser fallback removal
        run: |
          ! grep -n 'loadArenaState\|resetArenaState\|saveJournalEntry\|createJournalEntry' src/components/academy/trading-arena/TradingArenaDashboard.tsx
          grep -n 'fetchArenaExecutionState' src/components/academy/trading-arena/TradingArenaDashboard.tsx
          grep -n 'mutateArenaExecutionState' src/components/academy/trading-arena/TradingArenaDashboard.tsx

      - name: Commit Dashboard migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(arena): connect Dashboard to server execution state"
          git push origin HEAD:feat/trading-arena-execution-state-20260718
