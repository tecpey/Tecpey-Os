name: One-shot PR147 Manifest Baseline Refresh

on:
  push:
    branches: [fix/durable-sensitive-mutation-audit]
    paths:
      - .github/workflows/pr147-manifest-baseline-once.yml

permissions:
  contents: write

concurrency:
  group: one-shot-pr147-manifest-baseline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: fix/durable-sensitive-mutation-audit
          fetch-depth: 2

      - name: Verify immutable one-shot ancestry
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "2cd602e94338039cc5b3121ff0abd69a1c1b98f6"
          test "$(git log -1 --pretty=%s)" = "chore(security): one-shot PR147 manifest baseline refresh"

      - name: Generate and validate exact manifest
        run: |
          set -euo pipefail
          node scripts/generate-api-security-manifest.mjs --output=api-security-manifest.generated.json
          node scripts/postprocess-api-security-manifest.mjs --manifest=api-security-manifest.generated.json
          node scripts/apply-api-security-operation-overrides.mjs --manifest=api-security-manifest.generated.json
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          import { evaluateApiSecurityPolicy } from './scripts/api-security-manifest-policy.mjs';
          const manifest = JSON.parse(await readFile('api-security-manifest.generated.json', 'utf8'));
          const registry = JSON.parse(await readFile('config/api-security-exceptions.json', 'utf8'));
          const result = evaluateApiSecurityPolicy({ manifest, registry, now: new Date() });
          const counts = manifest.totals.findingCounts;
          if (
            !result.ok ||
            (counts.missing_audit_or_observability_evidence ?? 0) !== 0 ||
            (counts.required_strict_revocation_missing ?? 0) !== 16 ||
            (counts.parsed_body_without_size_limit ?? 0) !== 48 ||
            manifest.totals.findings !== 64
          ) {
            console.error(JSON.stringify({ result, totals: manifest.totals }, null, 2));
            process.exit(1);
          }
          console.log(JSON.stringify({ totals: manifest.totals, exceptions: result.exceptionCount }, null, 2));
          NODE

      - name: Commit only baseline and self-deletion
        run: |
          set -euo pipefail
          cp api-security-manifest.generated.json docs/security/generated/api-security-manifest.json
          rm api-security-manifest.generated.json
          git rm .github/workflows/pr147-manifest-baseline-once.yml
          git add docs/security/generated/api-security-manifest.json
          mapfile -t changed < <(git diff --cached --name-only)
          test "${#changed[@]}" -eq 2
          printf '%s\n' "${changed[@]}" | grep -Fx '.github/workflows/pr147-manifest-baseline-once.yml'
          printf '%s\n' "${changed[@]}" | grep -Fx 'docs/security/generated/api-security-manifest.json'
          git diff --quiet -- config/api-security-exceptions.json config/api-security-operation-overrides.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(security): commit zero-sensitive-audit-finding baseline"
          git push origin HEAD:fix/durable-sensitive-mutation-audit
