name: Academy P0 Verified Publisher — Never Merge

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build clean Academy P0 branch
    if: ${{ github.event.pull_request.number == 36 && github.head_ref == 'audit/academy-authority-call-sites-20260719' }}
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: feat/academy-server-issued-progress-20260719-v2
      NEXT_PUBLIC_SITE_URL: https://tecpey.ir
      NEXT_PUBLIC_API_URL: https://my.tecpey.ir
      NEXT_PUBLIC_API_BACKEND_URL: https://ci-placeholder.tecpey.ir
      NEXT_PUBLIC_API_SOCKET_URL: wss://ci-placeholder.tecpey.ir/spot
      TECPEY_SESSION_SECRET: ci-placeholder-session-secret-32-chars-min
      CERTIFICATE_SIGNING_SECRET: ci-placeholder-cert-signing-secret-32-min
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
      TECPEY_ACADEMY_AUTH_SECRET: ci-placeholder-academy-auth-secret-32chars
      UPSTASH_REDIS_REST_URL: https://ci-placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-placeholder-redis-rest-token

    steps:
      - name: Checkout isolated audit branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify reviewed patches outside worktree
        shell: bash
        run: |
          set -euo pipefail
          cat \
            audit/academy-p0-patch-parts-v2/part-00 \
            audit/academy-p0-patch-parts-v2/part-01 \
            audit/academy-p0-patch-parts-v2/part-02 \
            audit/academy-p0-patch-parts-v2/part-03-00 \
            audit/academy-p0-patch-parts-v2/part-03-01 \
            audit/academy-p0-patch-parts-v2/part-03-02-00 \
            audit/academy-p0-patch-parts-v2/part-03-02-01 \
            audit/academy-p0-patch-parts-v2/part-03-02-02 \
            audit/academy-p0-patch-parts-v2/part-03-02-03 \
            audit/academy-p0-patch-parts-v2/part-04-00 \
            audit/academy-p0-patch-parts-v2/part-04-01-00-00 \
            audit/academy-p0-patch-parts-v2/part-04-01-00-01 \
            audit/academy-p0-patch-parts-v2/part-04-01-00-02 \
            audit/academy-p0-patch-parts-v2/part-04-01-00-03 \
            audit/academy-p0-patch-parts-v2/part-04-01-01 \
            audit/academy-p0-patch-parts-v2/part-04-01-02 \
            audit/academy-p0-patch-parts-v2/part-04-01-03 \
            audit/academy-p0-patch-parts-v2/part-04-02 \
            audit/academy-p0-patch-parts-v2/part-05 \
            > /tmp/academy-p0.patch.gz.b64

          test "$(wc -c < /tmp/academy-p0.patch.gz.b64)" -eq 33476
          echo "44c352e53c7ad64905959f58bbdd8960193f5473452e7dce93332091483a3b00  /tmp/academy-p0.patch.gz.b64" | sha256sum --check --strict
          base64 --decode /tmp/academy-p0.patch.gz.b64 > /tmp/academy-p0.patch.gz
          gzip --decompress --stdout /tmp/academy-p0.patch.gz > /tmp/academy-p0.patch
          test "$(wc -c < /tmp/academy-p0.patch)" -eq 103808
          echo "decc045485f074b181a819b307f5ab00a1127fce38e696639dae80443c698b9e  /tmp/academy-p0.patch" | sha256sum --check --strict

          test "$(wc -c < audit/academy-p0-mentor-reason.patch)" -eq 608
          echo "cd517e57818b1f5a0ece778ce04109a150a25f23923e27fdf0df34458e683f09  audit/academy-p0-mentor-reason.patch" | sha256sum --check --strict
          cp audit/academy-p0-mentor-reason.patch /tmp/academy-p0-mentor-reason.patch

      - name: Create clean branch from protected main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            echo "Target branch already exists; refusing to overwrite reviewed history."
            exit 1
          fi
          git checkout -B "$TARGET_BRANCH" origin/main
          test ! -e audit/academy-p0-patch-parts-v2
          test ! -e audit/academy-p0-patch-parts
          test ! -e audit/academy-server-issued-progress.patch.gz.b64
          test ! -e audit/academy-p0-mentor-reason.patch
          test ! -e .github/workflows/academy-p0-publish.yml
          test ! -e .github/workflows/academy-authority-audit.yml

      - name: Apply reviewed implementation patches
        shell: bash
        run: |
          set -euo pipefail
          git apply --check /tmp/academy-p0.patch
          git apply /tmp/academy-p0.patch
          git apply --check /tmp/academy-p0-mentor-reason.patch
          git apply /tmp/academy-p0-mentor-reason.patch
          git diff --check
          if git status --short | grep -E '(^| )audit/|academy-p0-publish|academy-authority-audit'; then
            echo "Audit-only material leaked into the product branch."
            exit 1
          fi
          git status --short

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Verify npm version
        shell: bash
        run: |
          set -euo pipefail
          NPM_MAJOR=$(npm --version | cut -d. -f1)
          test "$NPM_MAJOR" = "10"

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Production environment contract
        env:
          NODE_ENV: production
        run: npm run env:check

      - name: TypeScript
        id: typescript
        shell: bash
        run: |
          set +e
          ./node_modules/.bin/tsc --noEmit 2>&1 | tee /tmp/academy-p0-tsc.log
          STATUS=${PIPESTATUS[0]}
          exit "$STATUS"

      - name: Upload TypeScript diagnostics
        if: ${{ always() && steps.typescript.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: academy-p0-typescript-diagnostics
          path: /tmp/academy-p0-tsc.log
          if-no-files-found: error
          retention-days: 1

      - name: ESLint
        id: eslint
        shell: bash
        run: |
          set +e
          ./node_modules/.bin/eslint . --max-warnings 0 2>&1 | tee /tmp/academy-p0-eslint.log
          STATUS=${PIPESTATUS[0]}
          exit "$STATUS"

      - name: Upload ESLint diagnostics
        if: ${{ always() && steps.eslint.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: academy-p0-eslint-diagnostics
          path: /tmp/academy-p0-eslint.log
          if-no-files-found: error
          retention-days: 1

      - name: Browser persistence guard
        run: node scripts/check-browser-persistence.mjs

      - name: Admin authentication boundary guard
        run: node scripts/check-admin-auth-boundary.mjs

      - name: Full tests
        run: npm test

      - name: Production build
        env:
          NODE_ENV: production
        run: npm run build

      - name: Commit verified product changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "TecPey Engineering"
          git config user.email "engineering@tecpey.ir"
          git add \
            docs/architecture/ACADEMY_PROGRESS_AUTHORITY.md \
            src/app/api/academy-lesson-progress/route.ts \
            src/app/api/academy-state/route.ts \
            src/app/api/academy-term-progress/route.ts \
            src/components/academy/v2/FlashcardDeck.tsx \
            src/components/academy/v2/LessonPlayerV2.tsx \
            src/components/academy/v2/QuizEngineV2.tsx \
            src/lib/academy-lesson-assessment.ts \
            src/lib/academy-lesson-progress.ts \
            src/lib/academy-progress-authority.ts \
            src/lib/academy-progress.ts \
            src/lib/db-migrate-user-state.ts \
            src/lib/mentor-events.ts \
            src/tests/academy/lesson-assessment.test.ts \
            src/tests/academy/progress-authority-boundary.test.ts \
            src/tests/academy/progress-authority.test.ts \
            src/tests/academy/progress-state.test.ts
          test -z "$(git status --short | grep '^??' || true)"
          git commit -m "feat(academy): make progress and rewards server-issued"

      - name: Push verified branch
        run: git push --set-upstream origin "$TARGET_BRANCH"
