name: Academy Authority Audit — Never Merge

on:
  push:
    branches:
      - audit/academy-authority-call-sites-20260719
  pull_request:
    branches:
      - main

jobs:
  inventory:
    name: Academy authority call-site inventory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build complete authority inventory
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT=academy-authority-inventory.txt
          : > "$OUTPUT"

          {
            echo '=== CLIENT MUTATION HELPERS AND CALL SITES ==='
            git grep -n -E 'awardXp|recordLessonComplete|recordModuleScore|passTerm|awardBadge' -- 'src/**/*.ts' 'src/**/*.tsx' || true
            echo
            echo '=== ACADEMY STATE ENDPOINT USAGE ==='
            git grep -n -E '/api/academy-state|AcademyProgressAction|applyAcademyProgressAction|XP_TABLE' -- 'src/**/*.ts' 'src/**/*.tsx' || true
            echo
            echo '=== AUTHORITATIVE ROUTES AND TABLES ==='
            git grep -n -E 'academy_lesson_progress|academy_term_learning_progress|academy_term_progress|academy_quiz|academy_student_events|lesson_complete|module_score|pass_term|award_badge|award_xp' -- 'src/**/*.ts' 'src/**/*.tsx' || true
            echo
            echo '=== RELEVANT TEST FILES ==='
            git ls-files 'src/tests/**' | grep -E 'academy|lesson|quiz|progress|term|badge|xp' || true
          } | tee "$OUTPUT"

          test -s "$OUTPUT"

      - name: Upload inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: academy-authority-inventory
          path: academy-authority-inventory.txt
          if-no-files-found: error
          retention-days: 1

      - name: Package reviewed source snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar -czf tecpey-source-snapshot.tgz \
            src scripts docs .github/workflows/ci.yml \
            package.json package-lock.json server.ts tsconfig.json \
            next.config.ts eslint.config.mjs Dockerfile ecosystem.config.cjs

      - name: Upload reviewed source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: tecpey-source-snapshot
          path: tecpey-source-snapshot.tgz
          if-no-files-found: error
          retention-days: 1

      - name: Guard audit-only execution
        env:
          AUDIT_HEAD: ${{ github.head_ref }}
          AUDIT_REF: ${{ github.ref_name }}
        run: |
          if [ "$AUDIT_HEAD" != 'audit/academy-authority-call-sites-20260719' ] && [ "$AUDIT_REF" != 'audit/academy-authority-call-sites-20260719' ]; then
            echo 'Refusing to execute outside the isolated audit branch.'
            exit 1
          fi
          echo 'AUDIT-ONLY: this workflow and branch must never merge into main.'
