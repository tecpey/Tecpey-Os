name: Withdrawal Guard Diagnostics

on:
  push:
    branches:
      - fix/withdrawal-external-effect-evidence

permissions:
  contents: write

concurrency:
  group: withdrawal-guard-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/withdrawal-external-effect-evidence

      - name: Capture withdrawal authority guard
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/check-withdrawal-external-effect-evidence.mjs 2>&1 | tee withdrawal-guard.log

      - name: Commit diagnostics when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f withdrawal-guard.log
          if git diff --cached --quiet; then
            echo "No diagnostics change."
            exit 0
          fi
          git commit -m "chore(ci): capture withdrawal guard diagnostics"
          git push origin HEAD:fix/withdrawal-external-effect-evidence
