name: Withdrawal Guard Diagnostics

on:
  push:
    branches:
      - fix/withdrawal-external-effect-evidence

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run withdrawal authority guard
        run: |
          set -o pipefail
          node scripts/check-withdrawal-external-effect-evidence.mjs 2>&1 | tee withdrawal-guard.log

      - name: Upload diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: withdrawal-guard-${{ github.sha }}
          path: withdrawal-guard.log
          if-no-files-found: error
          retention-days: 3
