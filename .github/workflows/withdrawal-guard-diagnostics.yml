name: Withdrawal Guard Diagnostics

on:
  push:
    branches:
      - fix/withdrawal-external-effect-evidence

permissions:
  contents: write

concurrency:
  group: withdrawal-guard-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/withdrawal-external-effect-evidence

      - name: Apply bounded inventory contract patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("docs/security/WITHDRAWAL_EXTERNAL_EFFECT_EVIDENCE_INVENTORY.md")
          source = path.read_text()

          non_goal = (
              "This slice does not by itself approve real-money custody, a production "
              "signer or any custody launch.\n\n"
          )
          if non_goal not in source:
              marker = "It does not:\n\n"
              if source.count(marker) != 1:
                  raise SystemExit("bounded inventory non-goal marker mismatch")
              source = source.replace(marker, non_goal + marker, 1)

          ambiguity = (
              "\n\nThe confirmed ambiguity window is the interval after an RPC may have "
              "accepted the signed transaction but before the accepted outcome commits "
              "to PostgreSQL. It must become durable reconciliation debt before any "
              "rebroadcast."
          )
          if ambiguity.strip() not in source:
              marker = (
                  "6. mandatory evidence coupled to every authoritative database "
                  "transition."
              )
              if source.count(marker) != 1:
                  raise SystemExit("bounded inventory ambiguity marker mismatch")
              source = source.replace(marker, marker + ambiguity, 1)

          path.write_text(source)
          PY

      - name: Capture withdrawal authority guard
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/check-withdrawal-external-effect-evidence.mjs 2>&1 | tee withdrawal-guard.log

      - name: Commit bounded documentation and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/security/WITHDRAWAL_EXTERNAL_EFFECT_EVIDENCE_INVENTORY.md
          git add -f withdrawal-guard.log
          if git diff --cached --quiet; then
            echo "No bounded documentation or diagnostics change."
            exit 0
          fi
          git commit -m "docs(withdrawal): clarify custody and ambiguity contracts"
          git push origin HEAD:fix/withdrawal-external-effect-evidence
