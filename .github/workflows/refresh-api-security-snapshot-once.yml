name: Refresh API Security Snapshot Once

on:
  push:
    branches: [fix/api-security-manifest]

permissions:
  contents: write

concurrency:
  group: refresh-api-security-snapshot-once
  cancel-in-progress: true

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: fix/api-security-manifest
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate exact governed snapshot
        run: |
          mkdir -p docs/security/generated
          node scripts/generate-api-security-manifest.mjs --output=docs/security/generated/api-security-manifest.json
          node scripts/postprocess-api-security-manifest.mjs --manifest=docs/security/generated/api-security-manifest.json
          node scripts/apply-api-security-operation-overrides.mjs --manifest=docs/security/generated/api-security-manifest.json

      - name: Remove one-shot workflow and commit exact snapshot
        run: |
          rm .github/workflows/refresh-api-security-snapshot-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/security/generated/api-security-manifest.json .github/workflows/refresh-api-security-snapshot-once.yml
          if git diff --cached --quiet; then
            echo "Snapshot already exact; removing one-shot workflow only."
          fi
          git commit -m "chore(security): refresh exact API manifest snapshot"
          git push origin HEAD:fix/api-security-manifest
