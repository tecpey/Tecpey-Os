name: One-shot Bounded Body Route Migration

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/bounded-body-route-migration-once.yml

permissions:
  contents: write

concurrency:
  group: one-shot-bounded-body-route-migration
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: fix/bounded-request-bodies
          fetch-depth: 2

      - name: Apply deterministic route migration
        run: python3 scripts/apply-bounded-body-routes-once.py

      - name: Verify deterministic file scope
        run: |
          set -euo pipefail
          python3 <<'PY'
          import subprocess
          expected = {
              "package.json",
              "src/app/api/academy/auth/login/route.ts",
              "src/app/api/academy/auth/register/route.ts",
              "src/app/api/academy-auth/route.ts",
              "src/app/api/academy-certificates/route.ts",
              "src/app/api/academy-flashcards/route.ts",
              "src/app/api/academy-lead/route.ts",
              "src/app/api/academy-lesson-assessment/route.ts",
              "src/app/api/academy-reflections/route.ts",
              "src/app/api/academy-simulator-decision/route.ts",
              "src/app/api/academy-specialized-lead/route.ts",
              "src/app/api/academy-student-profile/route.ts",
              "src/app/api/academy-term-progress/route.ts",
              "src/app/api/admin/withdrawals/[id]/route.ts",
              "src/app/api/ai-mentor/route.ts",
              "src/app/api/api-keys/[id]/route.ts",
              "src/app/api/api-keys/route.ts",
              "src/app/api/auth/2fa/backup/route.ts",
              "src/app/api/auth/2fa/disable/route.ts",
              "src/app/api/auth/2fa/enroll/route.ts",
              "src/app/api/auth/2fa/verify/route.ts",
              "src/app/api/auth/devices/[id]/route.ts",
              "src/app/api/auth/password/change/route.ts",
              "src/app/api/auth/webauthn/auth/challenge/route.ts",
              "src/app/api/auth/webauthn/auth/verify/route.ts",
              "src/app/api/auth/webauthn/credentials/[id]/route.ts",
              "src/app/api/auth/webauthn/register/verify/route.ts",
              "src/app/api/auth/withdraw/authorize/route.ts",
              "src/app/api/auth/withdraw/route.ts",
              "src/app/api/command-center/auth/bootstrap/challenge/route.ts",
              "src/app/api/command-center/auth/bootstrap/verify/route.ts",
              "src/app/api/command-center/auth/passkey/verify/route.ts",
              "src/app/api/command-center/campaign/route.ts",
              "src/app/api/community/profile/route.ts",
              "src/app/api/device-token/route.ts",
              "src/app/api/learning-events/route.ts",
              "src/app/api/mentor-challenge/route.ts",
              "src/app/api/mentor-conversations/migrate/route.ts",
              "src/app/api/mentor-memory/route.ts",
              "src/app/api/notifications/[id]/route.ts",
              "src/app/api/notifications/consent/route.ts",
              "src/app/api/notifications/preferences/route.ts",
              "src/app/api/notifications/read/route.ts",
              "src/app/api/offline-sync/route.ts",
              "src/app/api/orders/route.ts",
              "src/app/api/trading-arena/execution/route.ts",
              "src/app/api/trading-arena/reflections/route.ts",
              "src/app/api/trading-arena/route.ts",
          }
          lines = subprocess.check_output(["git", "status", "--short"], text=True).splitlines()
          changed = {line[3:] for line in lines if len(line) > 3}
          if changed != expected:
              raise SystemExit(
                  f"migration scope mismatch; missing={sorted(expected - changed)} "
                  f"unexpected={sorted(changed - expected)}"
              )
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Verify bounded body authority and adversarial tests
        run: |
          set -euo pipefail
          npm run bounded-body:check
          npm run test:bounded-body
          node --test \
            scripts/api-security-body-limit-policy.test.mjs \
            scripts/api-security-body-boundary.test.mjs

      - name: Verify TypeScript and ESLint
        run: |
          set -euo pipefail
          npm run typecheck
          npm run lint

      - name: Verify diagnostic manifest reaches zero findings
        run: |
          set -euo pipefail
          node scripts/generate-api-security-manifest.mjs --output=api-security-manifest.diagnostic.json
          node scripts/postprocess-api-security-manifest.mjs --manifest=api-security-manifest.diagnostic.json
          node scripts/apply-api-security-operation-overrides.mjs --manifest=api-security-manifest.diagnostic.json
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('api-security-manifest.diagnostic.json', 'utf8'));
          const counts = manifest.totals?.findingCounts ?? {};
          if ((counts.parsed_body_without_size_limit ?? 0) !== 0) {
            throw new Error(`bounded body findings remain: ${counts.parsed_body_without_size_limit}`);
          }
          if ((manifest.totals?.findings ?? -1) !== 0) {
            throw new Error(`unexpected remaining manifest findings: ${manifest.totals?.findings}`);
          }
          NODE
          git diff --check

      - name: Commit permanent route migration
        run: |
          set -euo pipefail
          git add package.json src/app/api
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(security): bound all governed API request bodies"
          git push origin HEAD:fix/bounded-request-bodies
