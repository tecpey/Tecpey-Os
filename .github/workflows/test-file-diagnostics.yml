name: Reflection Test File Diagnostics

on:
  pull_request:
    branches: [main]

jobs:
  reflection-test-files:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_placeholder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci_placeholder"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --silent --no-audit --no-fund
      - run: npm run db:migrate > /dev/null
      - name: Reflection authority unit tests
        run: node --import tsx --test src/tests/arena/reflection-authority.test.ts
      - name: Reflection evidence unit tests
        run: node --import tsx --test src/tests/arena/reflection-evidence.test.ts
      - name: Reflection input unit tests
        run: node --import tsx --test src/tests/arena/reflection-input.test.ts
      - name: Reflection PostgreSQL integration tests
        run: node --import tsx --test src/tests/arena/reflection-postgres.test.ts
