name: Temporary Arena Execution Source Export

on:
  pull_request:
    branches: [main]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: arena-execution-sources
          path: |
            src/lib/trading-arena.ts
            src/components/academy/trading-arena/TradingArenaDashboard.tsx
            src/components/academy/trading-arena/ScenarioPlayer.tsx
            src/components/academy/trading-arena/OrderPanel.tsx
            src/components/academy/trading-arena/PositionsPanel.tsx
            src/components/academy/trading-arena/TradeHistory.tsx
          if-no-files-found: error
          retention-days: 1
