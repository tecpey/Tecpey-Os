name: Temporary Academy Lesson Control Refactor

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refactor:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/academy-legacy-progress-server-20260718
          fetch-depth: 0

      - name: Integrate server-backed controls into official term pages
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              (
                  Path('src/components/academy/AcademyTermPage.tsx'),
                  'import { TermAccessGuard } from "@/components/academy/TermAccessGuard";\n',
                  'import { TermAccessGuard } from "@/components/academy/TermAccessGuard";\nimport { AcademyLessonCompletionControl } from "@/components/academy/AcademyLessonCompletionControl";\n',
                  '''                      </Link>\n                    </div>\n                  </article>''',
                  '''                      </Link>\n                    </div>\n                    <AcademyLessonCompletionControl\n                      locale="fa"\n                      termSlug={term.slug}\n                      sectionKey={`lesson-${index + 1}`}\n                    />\n                  </article>''',
              ),
              (
                  Path('src/components/academy/AcademyTermPageEn.tsx'),
                  'import { TermAccessGuard } from "@/components/academy/TermAccessGuard";\n',
                  'import { TermAccessGuard } from "@/components/academy/TermAccessGuard";\nimport { AcademyLessonCompletionControl } from "@/components/academy/AcademyLessonCompletionControl";\n',
                  '''                      <p className="mt-3 text-sm font-bold leading-8 text-slate-700">{proTip}</p>\n                    </div>\n                  </article>''',
                  '''                      <p className="mt-3 text-sm font-bold leading-8 text-slate-700">{proTip}</p>\n                    </div>\n                    <AcademyLessonCompletionControl\n                      locale="en"\n                      termSlug={term.slug}\n                      sectionKey={`lesson-${index + 1}`}\n                    />\n                  </article>''',
              ),
          ]

          for path, import_old, import_new, body_old, body_new in files:
              source = path.read_text()
              if 'AcademyLessonCompletionControl' in source:
                  raise SystemExit(f'{path}: control already integrated unexpectedly')
              if source.count(import_old) != 1:
                  raise SystemExit(f'{path}: expected import anchor exactly once')
              if source.count(body_old) != 1:
                  raise SystemExit(f'{path}: expected lesson body anchor exactly once')
              source = source.replace(import_old, import_new, 1)
              source = source.replace(body_old, body_new, 1)
              path.write_text(source)

          workflow = Path('.github/workflows/academy-lesson-control-refactor.yml')
          workflow.unlink()
          PY

      - name: Commit targeted integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/academy/AcademyTermPage.tsx src/components/academy/AcademyTermPageEn.tsx .github/workflows/academy-lesson-control-refactor.yml
          git commit -m "refactor(academy): connect official lessons to server progress"
          git push origin HEAD:feat/academy-legacy-progress-server-20260718
