name: Browser Lock Bootstrap

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/browser-lock-bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-lock:
    name: Generate and commit pinned Playwright lockfile
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Generate package manifest and lockfile
        run: npm install --package-lock-only --ignore-scripts --save-dev --save-exact @playwright/test@1.61.1 --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Verify pinned dependency and clean install
        run: |
          node -e 'const p=require("./package.json"); if(p.devDependencies?.["@playwright/test"]!=="1.61.1") process.exit(1)'
          npm ci --ignore-scripts --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Commit generated manifests to PR branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "Pinned Playwright manifests are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "test(ui): pin Playwright browser test dependency"
          git push origin "HEAD:${HEAD_REF}"
