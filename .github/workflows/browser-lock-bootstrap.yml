name: Browser Golden Path Patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/browser-lock-bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    name: Apply bounded browser QA patch
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Apply staged patch
        run: python3 scripts/apply-browser-golden-path-patch.py

      - name: Commit non-workflow source patch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          rm -f .github/workflows/browser-golden-path.yml
          git checkout HEAD -- .github/workflows/browser-lock-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(ui): add public browser golden path source"
          git push origin "HEAD:${HEAD_REF}"
