name: Browser Golden Path Patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/browser-lock-bootstrap.yml'

permissions:
  contents: write

jobs:
  apply-patch:
    name: Apply bounded browser QA patch
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply deterministic source patch
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          root = Path('.')

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text())
          scripts = package['scripts']
          scripts['browser:check'] = 'node scripts/check-browser-golden-path-authority.mjs'
          scripts['test:browser'] = 'playwright test'
          release = scripts['release:check']
          marker = 'npm run ui:public:check &&'
          if 'npm run browser:check &&' not in release:
              if marker not in release:
                  raise SystemExit('release marker missing')
              release = release.replace(marker, marker + ' npm run browser:check &&', 1)
          scripts['release:check'] = release
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n')

          mentor_path = root / 'src/components/academy/GlobalAiMentorWidget.tsx'
          mentor = mentor_path.read_text()
          old = 'if (!academyChecked || !academyProfileReady) return null;'
          if old in mentor:
              mentor = mentor.replace(old, 'if (!academyChecked) return null;', 1)
          elif 'if (!academyChecked) return null;' not in mentor:
              raise SystemExit('mentor guard missing')
          mentor_path.write_text(mentor)

          landing_path = root / 'src/app/home/enterprise/TecpeyEnterpriseLanding.tsx'
          landing = landing_path.read_text()
          replacements = {
              '>Online</div>': '>نمایش آموزشی بازار</div>',
              '["پشتیبانی", "۲۴/۷"],': '["پشتیبانی", "ساعات اعلام‌شده"],',
              'قیمت لحظه‌ای و مسیر شروع معامله': 'نمای آموزشی قیمت و مسیر یادگیری',
              'از اولین آشنایی با بیت‌کوین تا اولین معامله واقعی، آموزش، تحلیل، ابزار و بازار زنده را در یک مسیر شفاف تجربه کنید؛ بدون عجله، بدون سیگنال‌فروشی و با تمرکز روی امنیت و مدیریت ریسک.': 'از اولین آشنایی با بیت‌کوین تا تمرین معامله در محیط آموزشی، آموزش، تحلیل، ابزار و نمای بازار را در یک مسیر شفاف تجربه کنید؛ دسترسی به هر خدمت مالی فقط پس از فعال‌سازی و تأیید عملیاتی همان خدمت ارائه می‌شود.'
          }
          for before, after in replacements.items():
              if before in landing:
                  landing = landing.replace(before, after, 1)
              elif after not in landing:
                  raise SystemExit(f'landing marker missing: {before}')
          landing_path.write_text(landing)

          (root / 'src/tests/browser').mkdir(parents=True, exist_ok=True)
          (root / 'docs/ui').mkdir(parents=True, exist_ok=True)

          (root / 'playwright.config.ts').write_text(r'''import { defineConfig, devices } from "@playwright/test";

