          (root / 'src/tests/browser/public-golden-path.spec.ts').write_text(r'''import { expect, test, type Locator, type Page } from "@playwright/test";

async function mockPublicState(page: Page) {
  await page.route("**/api/**", async (route) => {
    const path = new URL(route.request().url()).pathname;
    if (path === "/api/academy-auth") {
      await route.fulfill({ status: 200, contentType: "application/json", body: JSON.stringify({ authenticated: false }) });
      return;
    }
    if (path === "/api/academy-student-profile") {
      await route.fulfill({ status: 200, contentType: "application/json", body: JSON.stringify({ authenticated: false, profile: null }) });
      return;
    }
    if (path.startsWith("/api/mentor-conversations")) {
      await route.fulfill({ status: 200, contentType: "application/json", body: JSON.stringify({ ok: true, conversations: [] }) });
      return;
    }
    await route.fulfill({ status: 200, contentType: "application/json", body: "{}" });
  });
}

async function expectNoHorizontalOverflow(page: Page) {
  await expect.poll(() => page.evaluate(() => document.documentElement.scrollWidth <= document.documentElement.clientWidth + 1)).toBe(true);
}

async function expectReachable(locator: Locator) {
  await locator.scrollIntoViewIfNeeded();
  await expect(locator).toBeVisible();
  await expect.poll(() => locator.evaluate((element) => {
    const rect = element.getBoundingClientRect();
    if (!rect.width || !rect.height) return false;
    const x = Math.min(window.innerWidth - 1, Math.max(0, rect.left + rect.width / 2));
    const y = Math.min(window.innerHeight - 1, Math.max(0, rect.top + rect.height / 2));
    const top = document.elementFromPoint(x, y);
    return top === element || Boolean(top && element.contains(top));
  })).toBe(true);
}

async function openKnowledgeCenter(page: Page, label: string, arenaLabel: string) {
  const mobile = (page.viewportSize()?.width ?? 1440) < 1024;
  if (mobile) {
    await page.getByRole("button", { name: /باز کردن منو|Open menu/ }).click();
    const knowledge = page.locator("button:visible").filter({ hasText: label }).last();
    await knowledge.click();
    await expect(page.getByRole("link", { name: arenaLabel, exact: true })).toBeVisible();
    return;
  }

  const knowledge = page.getByRole("button", { name: label, exact: true });
  await knowledge.click();
  const menu = page.getByRole("menu", { name: label });
  await expect(menu).toBeVisible();
  await expect(menu.getByRole("menuitem", { name: arenaLabel, exact: true })).toBeVisible();
  await page.keyboard.press("Escape");
  await expect(menu).toBeHidden();
  await expect(knowledge).toBeFocused();
}

test.beforeEach(async ({ page }) => {
  await mockPublicState(page);
});

test("Persian public journey is truthful, navigable and unobscured", async ({ page }) => {
  await page.addInitScript(() => {
    Object.defineProperty(window, "IntersectionObserver", { configurable: true, value: undefined });
  });
  await page.goto("/", { waitUntil: "domcontentloaded" });

  await expect(page.locator("html")).toHaveAttribute("dir", "rtl");
  await expect(page.getByRole("heading", { name: "تک‌پی، نقطه امن ورود به بازار رمزارز" })).toBeVisible();
  const exchange = page.getByRole("link", { name: "ورود به صرافی", exact: true });
  const academy = page.getByRole("link", { name: "آکادمی رایگان", exact: true });
  await expect(exchange).toHaveAttribute("href", "https://my.tecpey.ir");
  await expect(academy).toHaveAttribute("href", "/academy");
  await expect(page.getByText("۲۴/۷", { exact: true })).toHaveCount(0);
  await expect(page.getByText("Online", { exact: true })).toHaveCount(0);
  await expect(page.getByText(/اولین معامله واقعی/)).toHaveCount(0);

  await openKnowledgeCenter(page, "مرکز دانش", "تریدینگ آرنا");

  const mentor = page.getByRole("button", { name: "از مربی آموزشی تک‌پی بپرس" });
  await expect(mentor).toBeVisible();
  await mentor.click();
  await expect(page.getByRole("heading", { name: "منتور بعد از ساخت پروفایل آکادمی فعال می‌شود" })).toBeVisible();
  await expect(page.getByRole("link", { name: "ساخت پروفایل آکادمی" })).toHaveAttribute("href", "/academy/onboarding");

  const footer = page.locator("footer");
  await expect(footer).toBeVisible();
  await expectReachable(academy);
  await expectNoHorizontalOverflow(page);
});

test("English public journey preserves LTR navigation and locked mentor truth", async ({ page }) => {
  await page.goto("/en", { waitUntil: "domcontentloaded" });
  await expect(page.locator("html")).toHaveAttribute("dir", "ltr");
  await openKnowledgeCenter(page, "Knowledge Center", "Trading Arena");

  const mentor = page.getByRole("button", { name: "Ask TecPey learning mentor" });
  await expect(mentor).toBeVisible();
  await mentor.click();
  await expect(page.getByRole("heading", { name: "Mentor activates after academy profile" })).toBeVisible();
  await expect(page.getByRole("link", { name: "Create academy profile" })).toHaveAttribute("href", "/en/academy/onboarding");
  await expect(page.locator("footer")).toBeVisible();
  await expectNoHorizontalOverflow(page);
});

test("Theme choice changes the rendered authority and survives reload", async ({ page }) => {
  await page.addInitScript(() => window.localStorage.setItem("theme", "light"));
  await page.emulateMedia({ colorScheme: "light" });
  await page.goto("/", { waitUntil: "domcontentloaded" });

  const toggle = page.locator('button[aria-label*="تغییر به حالت"]:visible').first();
  await expect(toggle).toHaveAttribute("aria-pressed", "false");
  await toggle.click();
  await expect(toggle).toHaveAttribute("aria-pressed", "true");
  await expect(page.locator("html")).toHaveClass(/dark/);
  await expect.poll(() => page.evaluate(() => window.localStorage.getItem("theme"))).toBe("dark");

  await page.reload({ waitUntil: "domcontentloaded" });
  const persisted = page.locator('button[aria-label*="تغییر به حالت"]:visible').first();
  await expect(persisted).toHaveAttribute("aria-pressed", "true");
  await expect(page.locator("html")).toHaveClass(/dark/);
});
''')

          (root / 'scripts/check-browser-golden-path-authority.mjs').write_text(r'''import { existsSync, readFileSync } from "node:fs";

const failures = [];
const read = (path) => readFileSync(path, "utf8");
const requireText = (source, token, message) => {
  if (!source.includes(token)) failures.push(message);
};

const packageJson = JSON.parse(read("package.json"));
if (packageJson.devDependencies?.["@playwright/test"] !== "1.61.1") {
  failures.push("@playwright/test must remain exactly pinned to 1.61.1");
}
if (packageJson.scripts?.["browser:check"] !== "node scripts/check-browser-golden-path-authority.mjs") {
  failures.push("browser:check script is missing or changed");
}
if (packageJson.scripts?.["test:browser"] !== "playwright test") {
  failures.push("test:browser script is missing or changed");
}
requireText(packageJson.scripts?.["release:check"] ?? "", "npm run browser:check", "release:check must include the browser authority source guard");

for (const path of [
  "playwright.config.ts",
  "src/tests/browser/public-golden-path.spec.ts",
  ".github/workflows/browser-golden-path.yml",
  "docs/ui/PUBLIC_BROWSER_GOLDEN_PATH.md",
]) {
  if (!existsSync(path)) failures.push(`required browser QA file missing: ${path}`);
}

if (existsSync(".github/workflows/browser-lock-bootstrap.yml")) {
  failures.push("temporary browser lock/bootstrap workflow must not enter main");
}

const config = read("playwright.config.ts");
for (const token of ["chromium-desktop", "firefox-desktop", "chromium-mobile", "firefox-mobile", "npm run dev", "retain-on-failure", "only-on-failure"]) {
  requireText(config, token, `Playwright configuration missing ${token}`);
}

const spec = read("src/tests/browser/public-golden-path.spec.ts");
for (const token of ["/api/academy-auth", "/api/academy-student-profile", "IntersectionObserver", "مرکز دانش", "Knowledge Center", "تریدینگ آرنا", "Trading Arena", "از مربی آموزشی تک‌پی بپرس", "Ask TecPey learning mentor", "scrollWidth", "localStorage.getItem(\"theme\")"]) {
  requireText(spec, token, `browser Golden Path coverage missing ${token}`);
}

const workflow = read(".github/workflows/browser-golden-path.yml");
for (const token of ["npm ci", "npm run browser:check", "playwright install --with-deps chromium firefox", "npm run test:browser", "if: failure()", "retention-days: 3"]) {
  requireText(workflow, token, `browser workflow missing ${token}`);
}

const landing = read("src/app/home/enterprise/TecpeyEnterpriseLanding.tsx");
for (const forbidden of ["۲۴/۷", ">Online</div>", "اولین معامله واقعی"]) {
  if (landing.includes(forbidden)) failures.push(`unsupported public landing claim remains: ${forbidden}`);
}
for (const required of ["نمایش آموزشی بازار", "ساعات اعلام‌شده", "فقط پس از فعال‌سازی و تأیید عملیاتی"]) {
  requireText(landing, required, `truthful landing disclosure missing: ${required}`);
}

const mentor = read("src/components/academy/GlobalAiMentorWidget.tsx");
if (mentor.includes("if (!academyChecked || !academyProfileReady) return null;")) {
  failures.push("public mentor entry is still hidden for users without an Academy profile");
}
for (const token of ["if (!academyChecked) return null;", "منتور بعد از ساخت پروفایل آکادمی فعال می‌شود", "Mentor activates after academy profile"]) {
  requireText(mentor, token, `public locked Mentor boundary missing: ${token}`);
}

if (failures.length) {
  console.error("Browser Golden Path authority failed:\n- " + failures.join("\n- "));
  process.exit(1);
}
console.log("Browser Golden Path authority passed: pinned Playwright, four browser/viewport projects, truthful public claims, public locked Mentor, and permanent CI evidence.");
''')

          (root / '.github/workflows/browser-golden-path.yml').write_text(r'''name: Browser Golden Path

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'src/tests/browser/**'
      - 'scripts/check-browser-golden-path-authority.mjs'
      - 'src/components/ThemeToggle.tsx'
      - 'src/components/navbar/Navbar.tsx'
      - 'src/components/academy/GlobalAiMentorWidget.tsx'
      - 'src/app/home/enterprise/TecpeyEnterpriseLanding.tsx'
      - 'src/app/en/**'
      - 'src/components/footer/**'
      - 'docs/ui/PUBLIC_BROWSER_GOLDEN_PATH.md'
      - '.github/workflows/browser-golden-path.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-golden-path-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    name: Public FA/EN browser acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install locked dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Verify browser authority contract
        run: npm run browser:check

      - name: Install governed browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run public Browser Golden Path
        env:
          CI: 'true'
        run: npm run test:browser

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-golden-path-failure-${{ github.sha }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 3
''')

          (root / 'docs/ui/PUBLIC_BROWSER_GOLDEN_PATH.md').write_text(r'''# TecPey Public Browser Golden Path

**Status:** Controlled soft-launch acceptance boundary  
**Owner:** #254 / parent #80  
**Scope:** Public education and Trading Arena discovery only

## Proven journey

The browser suite verifies Persian RTL and English LTR public navigation in Chromium and Firefox at desktop and mobile widths. It covers Theme persistence, Knowledge Center keyboard behavior, public Mentor discovery with a truthful locked state, Academy and Arena entry links, Footer visibility without IntersectionObserver, horizontal overflow and fixed-control obstruction.

## Authority and privacy

Browser tests use isolated mocked public API responses. They contain no production credentials, user records or staging access and do not authorize financial capability. The Mentor remains personalized only after a canonical Academy profile exists. Public ranking, rewards, Instructor access and real custody remain disabled.

## Truthful product boundary

The landing page must not claim unconditional 24/7 support, an ungoverned online state or production-certified real-money availability. Financial services are presented only as available after their own operational activation and release evidence.

## Evidence rule

`npm run browser:check` protects the source contract. `npm run test:browser` executes the browser behavior. A green build or static text scan alone is not browser acceptance. Failure traces, screenshots and video are retained only for a short diagnostic window.
''')
