name: Temporary API Security Risk Fact Refresh

on:
  push:
    branches: [fix/api-security-manifest]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temporary-api-security-risk-fact-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: fix/api-security-manifest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Correct academy auth credential risk fact
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/generate-api-security-manifest.mjs')
          source = path.read_text()
          old = '["credential", /\\/(?:auth|sessions?|device-token)(?:\\/|$)|2fa|webauthn|passkey|password|recovery/i],'
          new = '["credential", /\\/(?:auth|sessions?|device-token)(?:\\/|$)|academy-auth(?:\\/|$)|2fa|webauthn|passkey|password|recovery/i],'
          if old not in source:
              if new in source:
                  print('Risk fact already corrected.')
              else:
                  raise SystemExit('Expected credential risk detector was not found.')
          else:
              path.write_text(source.replace(old, new, 1))
          PY

      - name: Generate exact manifest
        run: node scripts/generate-api-security-manifest.mjs --output=api-security-manifest.generated.json

      - name: Apply governed shared contracts
        run: node scripts/postprocess-api-security-manifest.mjs --manifest=api-security-manifest.generated.json

      - name: Apply typed exact operation contracts
        run: node scripts/apply-api-security-operation-overrides.mjs --manifest=api-security-manifest.generated.json

      - name: Refresh exact baseline and grouped registry
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('api-security-manifest.generated.json', 'utf8'));
          const registry = JSON.parse(fs.readFileSync('config/api-security-exceptions.json', 'utf8'));
          if (registry.schemaVersion !== 2 || !Array.isArray(registry.groups)) {
            throw new Error('Expected schemaVersion 2 grouped registry.');
          }
          function ownerFor(route) {
            if (route.startsWith('/api/admin/') || route.startsWith('/api/command-center/')) return 'admin-security-platform';
            if (route.startsWith('/api/auth/') || route === '/api/academy-auth' || route.startsWith('/api/academy/auth/')) return 'identity-security';
            if (route.startsWith('/api/ai-mentor') || route.startsWith('/api/mentor-')) return 'mentor-ai-platform';
            if (route.startsWith('/api/device-token') || route.startsWith('/api/notifications/')) return 'notification-platform-security';
            if (route.includes('withdraw') || route.startsWith('/api/orders')) return 'exchange-wallet-security';
            if (route.startsWith('/api/offline-sync')) return 'offline-sync-platform';
            if (route.startsWith('/api/community/')) return 'social-platform-security';
            if (route.startsWith('/api/api-keys')) return 'developer-platform-security';
            if (route.startsWith('/api/learning-events')) return 'academy-event-platform';
            if (route.startsWith('/api/academy')) return 'academy-platform';
            return 'security-platform';
          }
          const byFinding = new Map();
          for (const entry of manifest.routes) {
            for (const finding of entry.findings) {
              const operations = byFinding.get(finding) ?? [];
              operations.push({ route: entry.route, method: entry.method, owner: ownerFor(entry.route) });
              byFinding.set(finding, operations);
            }
          }
          const known = new Set(registry.groups.map((group) => group.finding));
          for (const finding of byFinding.keys()) {
            if (!known.has(finding)) throw new Error(`No governed group for finding: ${finding}`);
          }
          registry.groups = registry.groups
            .filter((group) => byFinding.has(group.finding))
            .map((group) => ({ ...group, operations: byFinding.get(group.finding) }));
          fs.writeFileSync('docs/security/generated/api-security-manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          fs.writeFileSync('config/api-security-exceptions.json', `${JSON.stringify(registry, null, 2)}\n`);
          console.log(JSON.stringify({ totals: manifest.totals, groups: registry.groups.map((group) => ({ finding: group.finding, count: group.operations.length })) }, null, 2));
          NODE

      - name: Commit corrected detector and evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/generate-api-security-manifest.mjs docs/security/generated/api-security-manifest.json config/api-security-exceptions.json
          if git diff --cached --quiet; then
            echo "Risk fact and evidence are already current."
            exit 0
          fi
          git commit -m "fix(security): classify academy auth credential risk"
          git push origin HEAD:fix/api-security-manifest
