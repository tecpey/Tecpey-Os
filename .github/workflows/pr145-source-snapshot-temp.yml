name: Temporary PR145 Source Snapshot

on:
  push:
    branches: [fix/api-command-idempotency]
    paths:
      - .github/workflows/pr145-source-snapshot-temp.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect source context
        run: |
          set -euo pipefail
          mkdir -p snapshot
          cp -R package.json package-lock.json tsconfig.json snapshot/
          mkdir -p snapshot/src/app/api snapshot/src/lib snapshot/src/tests snapshot/scripts snapshot/config snapshot/docs/security/generated
          cp -R src/app/api/admin snapshot/src/app/api/
          cp -R src/app/api/auth snapshot/src/app/api/
          cp -R src/app/api/offline-sync snapshot/src/app/api/
          cp -R src/app/api/orders snapshot/src/app/api/
          cp -R src/lib/security snapshot/src/lib/
          cp -R src/lib/trading snapshot/src/lib/
          cp src/lib/db.ts src/lib/db-migration-plan.ts src/lib/db-migrate-api-command-idempotency.ts snapshot/src/lib/
          cp -R src/tests/security snapshot/src/tests/
          cp scripts/check-api-security-manifest.mjs scripts/generate-api-security-manifest.mjs scripts/postprocess-api-security-manifest.mjs scripts/apply-api-security-operation-overrides.mjs scripts/api-security-*.mjs snapshot/scripts/
          cp config/api-security-exceptions.json config/api-security-operation-overrides.json snapshot/config/
          cp docs/security/generated/api-security-manifest.json snapshot/docs/security/generated/
          git rev-parse HEAD > snapshot/HEAD_SHA.txt
      - uses: actions/upload-artifact@v4
        with:
          name: pr145-source-snapshot-${{ github.sha }}
          path: snapshot
          if-no-files-found: error
          retention-days: 2
