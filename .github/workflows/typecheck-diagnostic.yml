name: TypeScript Diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://tecpey.ir
      NEXT_PUBLIC_API_URL: https://my.tecpey.ir
      NEXT_PUBLIC_API_the model_URL: https://ci-placeholder.tecpey.ir
      NEXT_PUBLIC_API_SOCKET_URL: wss://ci-placeholder.tecpey.ir/spot
      TECPEY_SESSION_SECRET: ci-placeholder-session-secret-32-chars-min
      CERTIFICATE_SIGNING_SECRET: ci-placeholder-cert-signing-secret-32-min
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
      TECPEY_ACADEMY_AUTH_SECRET: ci-placeholder-academy-auth-secret-32chars

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund
      - name: Capture TypeScript output
        id: typecheck
        continue-on-error: true
        run: ./node_modules/.bin/tsc --noEmit --pretty false > typescript-diagnostics.txt 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: typescript-diagnostics.txt
          if-no-files-found: error
          retention-days: 1
      - name: Preserve failure status
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
