name: One-shot Strict Revocation Remediation

on:
  push:
    branches: [fix/strict-revocation-high-risk-mutations]
    paths:
      - .github/workflows/strict-revocation-remediation-once.yml
      - scripts/apply-strict-revocation-once.py

permissions:
  contents: write

concurrency:
  group: one-shot-strict-revocation-remediation
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: fix/strict-revocation-high-risk-mutations
          fetch-depth: 2

      - name: Apply reviewed source remediation
        run: |
          set -euo pipefail
          echo "strict-revocation-remediation-v2"
          python3 scripts/apply-strict-revocation-once.py
          node scripts/check-strict-revocation-authority.mjs
          node --test scripts/api-security-strict-revocation-evidence.test.mjs
          git diff --check

      - name: Verify deterministic file scope
        run: |
          set -euo pipefail
          python3 <<'PY'
          import subprocess
          expected = {
              "package.json",
              "scripts/api-security-runtime-evidence.mjs",
              "scripts/generate-api-security-manifest.mjs",
              "scripts/api-security-strict-revocation-evidence.test.mjs",
              "scripts/check-strict-revocation-authority.mjs",
              "src/app/api/ai-mentor/route.ts",
              "src/app/api/auth/2fa/backup/route.ts",
              "src/app/api/auth/2fa/disable/route.ts",
              "src/app/api/auth/2fa/enroll/route.ts",
              "src/app/api/auth/devices/[id]/route.ts",
              "src/app/api/auth/webauthn/credentials/[id]/route.ts",
              "src/app/api/auth/webauthn/register/verify/route.ts",
              "src/app/api/community/profile/route.ts",
              "src/app/api/mentor-memory/route.ts",
              "src/app/api/notifications/consent/route.ts",
              "src/app/api/notifications/preferences/route.ts",
              "src/lib/community-career.ts",
              "src/lib/notifications/principal.ts",
              "src/tests/security/auth-strict-revocation-routes.test.ts",
          }
          changed = set(subprocess.check_output(
              ["git", "status", "--short"], text=True
          ).splitlines())
          paths = {line[3:] for line in changed if len(line) > 3}
          unexpected = paths - expected - {
              ".github/workflows/strict-revocation-remediation-once.yml",
              ".github/workflows/strict-revocation-pr-executor-once.yml",
              "scripts/apply-strict-revocation-once.py",
          }
          if unexpected:
              raise SystemExit(f"unexpected remediation files: {sorted(unexpected)}")
          missing = expected - paths
          if missing:
              raise SystemExit(f"expected remediation files unchanged: {sorted(missing)}")
          PY

      - name: Commit permanent remediation and remove temporary executors
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/strict-revocation-remediation-once.yml \
            .github/workflows/strict-revocation-pr-executor-once.yml \
            scripts/apply-strict-revocation-once.py
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(security): require strict revocation on high-risk mutations"
          git push origin HEAD:fix/strict-revocation-high-risk-mutations
