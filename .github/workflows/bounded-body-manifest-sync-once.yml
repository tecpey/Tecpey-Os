name: One-shot Bounded Body Manifest Sync

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/bounded-body-manifest-sync-once.yml

permissions:
  contents: write

concurrency:
  group: one-shot-bounded-body-manifest-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: fix/bounded-request-bodies
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Regenerate exact manifest and remove resolved exception group
        run: |
          set -euo pipefail
          node scripts/generate-api-security-manifest.mjs --output=docs/security/generated/api-security-manifest.json
          node scripts/postprocess-api-security-manifest.mjs --manifest=docs/security/generated/api-security-manifest.json
          node scripts/apply-api-security-operation-overrides.mjs --manifest=docs/security/generated/api-security-manifest.json
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'config/api-security-exceptions.json';
          const registry = JSON.parse(fs.readFileSync(path, 'utf8'));
          const before = registry.groups.length;
          registry.groups = registry.groups.filter((group) => group.id !== 'bounded-bodies');
          if (registry.groups.length !== before - 1) {
            throw new Error('bounded-bodies exception group was not removed exactly once');
          }
          fs.writeFileSync(path, `${JSON.stringify(registry, null, 2)}\n`);
          NODE
          node <<'NODE'
          const manifest = require('./docs/security/generated/api-security-manifest.json');
          const counts = manifest.totals?.findingCounts ?? {};
          if ((counts.parsed_body_without_size_limit ?? 0) !== 0) {
            throw new Error(`bounded body findings remain: ${counts.parsed_body_without_size_limit}`);
          }
          if ((manifest.totals?.findings ?? -1) !== 0) {
            throw new Error(`unexpected remaining manifest findings: ${manifest.totals?.findings}`);
          }
          NODE
          npm run bounded-body:check
          npm run test:bounded-body
          npm run api:security:check
          git diff --check

      - name: Commit governed snapshot and registry
        run: |
          set -euo pipefail
          git add \
            docs/security/generated/api-security-manifest.json \
            config/api-security-exceptions.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(security): resolve bounded request body manifest debt"
          git push origin HEAD:fix/bounded-request-bodies
