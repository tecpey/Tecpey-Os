name: Temporary Source Export

on:
  push:
    branches:
      - feat/academy-reflections-server-20260718

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: lesson-player-source
          path: src/components/academy/v2/LessonPlayerV2.tsx
          if-no-files-found: error
          retention-days: 1
