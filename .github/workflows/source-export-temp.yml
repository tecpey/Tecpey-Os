name: Temporary Reflection Refactor

on:
  push:
    branches:
      - feat/academy-reflections-server-20260718

permissions:
  contents: write

jobs:
  refactor:
    if: ${{ !contains(github.event.head_commit.message, 'refactor(academy): use server-backed reflection editor') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/academy-reflections-server-20260718
          fetch-depth: 0

      - name: Apply exact Lesson Player refactor
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/academy/v2/LessonPlayerV2.tsx')
          source = path.read_text()
          function_start = 'function ReflectionPrompt({ prompt, lessonId }: { prompt: string; lessonId: string }) {'
          next_function = 'function ResponsibleTradingCard'

          if function_start not in source:
              raise SystemExit('Expected local ReflectionPrompt block was not found')
          if next_function not in source:
              raise SystemExit('Expected ResponsibleTradingCard boundary was not found')
          if 'import { ReflectionPrompt } from "./ReflectionPrompt";' in source:
              raise SystemExit('ReflectionPrompt import already exists unexpectedly')

          source = source.replace('  Pencil,\n', '', 1)
          source = source.replace(
              'import { FlashcardDeck } from "./FlashcardDeck";\n',
              'import { FlashcardDeck } from "./FlashcardDeck";\nimport { ReflectionPrompt } from "./ReflectionPrompt";\n',
              1,
          )
          start = source.index(function_start)
          end = source.index(next_function, start)
          source = source[:start] + source[end:]

          if 'localStorage' in source:
              raise SystemExit('Lesson Player still contains localStorage after refactor')
          path.write_text(source)

          workflow = Path('.github/workflows/source-export-temp.yml')
          workflow.unlink()
          PY

      - name: Commit targeted refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/academy/v2/LessonPlayerV2.tsx .github/workflows/source-export-temp.yml
          git commit -m "refactor(academy): use server-backed reflection editor"
          git push origin HEAD:feat/academy-reflections-server-20260718
