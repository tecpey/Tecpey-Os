name: Temporary API Security Baseline Refresh

on:
  push:
    branches: [fix/api-security-manifest]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temporary-api-security-baseline-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: fix/api-security-manifest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate exact manifest
        run: node scripts/generate-api-security-manifest.mjs --output=api-security-manifest.generated.json

      - name: Apply governed shared contracts
        run: node scripts/postprocess-api-security-manifest.mjs --manifest=api-security-manifest.generated.json

      - name: Apply exact operation contracts
        run: node scripts/apply-api-security-operation-overrides.mjs --manifest=api-security-manifest.generated.json

      - name: Refresh baseline and grouped debt registry
        run: node scripts/refresh-api-security-baseline-temporary.mjs

      - name: Commit exact generated evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/security/generated/api-security-manifest.json config/api-security-exceptions.json
          if git diff --cached --quiet; then
            echo "Exact baseline is already current."
            exit 0
          fi
          git commit -m "chore(security): refresh exact API security evidence"
          git push origin HEAD:fix/api-security-manifest
