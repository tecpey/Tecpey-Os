name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_placeholder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci_placeholder"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      NEXT_PUBLIC_SITE_URL: https://tecpey.ir
      NEXT_PUBLIC_API_URL: https://my.tecpey.ir
      NEXT_PUBLIC_API_BACKEND_URL: https://ci-placeholder.tecpey.ir
      NEXT_PUBLIC_API_SOCKET_URL: wss://ci-placeholder.tecpey.ir/spot
      TECPEY_SESSION_SECRET: ci-placeholder-session-secret-32-chars-min
      CERTIFICATE_SIGNING_SECRET: ci-placeholder-cert-signing-secret-32-min
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
      TECPEY_ACADEMY_AUTH_SECRET: ci-placeholder-academy-auth-secret-32chars
      UPSTASH_REDIS_REST_URL: https://ci-placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-placeholder-redis-rest-token
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify npm version
        run: |
          NPM_MAJOR=$(npm --version | cut -d. -f1)
          if [ "$NPM_MAJOR" != "10" ]; then
            echo "ERROR: npm major version must be 10. Got: $(npm --version)"
            exit 1
          fi
          echo "npm $(npm --version) OK"

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Production environment contract
        env:
          NODE_ENV: production
        run: npm run env:check

      - name: Clean database migrations
        run: npm run db:migrate

      - name: Database migration idempotency
        run: npm run db:migrate

      - name: TypeScript
        run: |
          set -o pipefail
          ./node_modules/.bin/tsc --noEmit 2>&1 | tee /tmp/tecpey-typescript-diagnostics.log

      - name: Upload TypeScript diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics-${{ github.sha }}
          path: /tmp/tecpey-typescript-diagnostics.log
          if-no-files-found: ignore
          retention-days: 3

      - name: ESLint
        run: ./node_modules/.bin/eslint . --max-warnings 0

      - name: Browser persistence guard
        run: node scripts/check-browser-persistence.mjs

      - name: Admin authentication boundary guard
        run: node scripts/check-admin-auth-boundary.mjs

      - name: Academy authority boundary guard
        run: node scripts/check-academy-authority-boundary.mjs

      - name: Arena UI authority boundary guard
        run: node scripts/check-arena-ui-authority.mjs

      - name: Wallet authority boundary guard
        run: node scripts/check-wallet-authority.mjs

      - name: Database migration authority guard
        run: node scripts/check-database-migration-authority.mjs

      - name: Exchange order admission authority guard
        run: node scripts/check-exchange-order-admission.mjs

      - name: Tests
        run: npm test

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build
