name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  arena-rebase:
    name: Arena Rebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: feat/trading-arena-authoritative-execution-20260719
          fetch-depth: 0
      - name: Rebase on protected main and restore canonical CI
        shell: bash
        run: |
          git config user.name "tecpey-ci"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main --quiet
          git rebase origin/main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git add .github/workflows/ci.yml
          git commit -m "chore(ci): restore canonical workflow after Arena rebase"
          git push --force-with-lease origin HEAD:feat/trading-arena-authoritative-execution-20260719
