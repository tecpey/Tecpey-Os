name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  arena-lint-fix:
    name: Arena Lint Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: feat/trading-arena-authoritative-execution-20260719
          fetch-depth: 0
      - name: Apply asserted lint fixes and restore canonical CI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected exactly one match in {path}, found {count}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "src/app/api/trading-arena/execution/route.ts",
              "  createArenaExecutionStateV2,\n",
              "",
          )
          replace_once(
              "src/tests/trading-arena-execution-v2.test.ts",
              "  type ArenaExecutionStateV2,\n",
              "",
          )

          subprocess.run(["git", "fetch", "origin", "main", "--quiet"], check=True)
          canonical_ci = subprocess.check_output(
              ["git", "show", "origin/main:.github/workflows/ci.yml"],
              text=True,
          )
          Path(".github/workflows/ci.yml").write_text(canonical_ci)
          PY

          git config user.name "tecpey-ci"
          git config user.email "actions@users.noreply.github.com"
          git add src/app/api/trading-arena/execution/route.ts \
                  src/tests/trading-arena-execution-v2.test.ts \
                  .github/workflows/ci.yml
          git commit -m "fix(arena): remove unused execution imports"
          git push origin HEAD:feat/trading-arena-authoritative-execution-20260719
