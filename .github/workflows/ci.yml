name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose-chart-cleanup:
    name: Diagnose Chart.js Cleanup Transfer
    runs-on: ubuntu-latest
    if: github.head_ref == 'chore/remove-superseded-chartjs-final-20260719'
    steps:
      - name: Checkout exact final branch
        uses: actions/checkout@v4
        with:
          ref: chore/remove-superseded-chartjs-final-20260719
          fetch-depth: 0

      - name: Run each transfer command without early exit
        shell: bash
        run: |
          set +e
          : > chart-transfer-diagnostic.txt
          run() {
            echo "=== $1 ===" >> chart-transfer-diagnostic.txt
            shift
            "$@" >> chart-transfer-diagnostic.txt 2>&1
            STATUS=$?
            echo "STATUS=$STATUS" >> chart-transfer-diagnostic.txt
            return 0
          }
          run fetch git fetch origin chore/remove-superseded-chartjs-path-20260719 --quiet
          run checkout-package git checkout origin/chore/remove-superseded-chartjs-path-20260719 -- package.json
          run checkout-lock git checkout origin/chore/remove-superseded-chartjs-path-20260719 -- package-lock.json
          run checkout-doc git checkout origin/chore/remove-superseded-chartjs-path-20260719 -- docs/audits/CLEANUP_SUPERSEDED_CHARTJS_20260719.md
          run rm-wrapper git rm 'src/app/crypto/[symbol]/ChartWrapper.tsx'
          run rm-live-chart git rm src/components/crypto/LivePriceChart.tsx
          run add-package git add package.json
          run add-lock git add package-lock.json
          run add-doc git add docs/audits/CLEANUP_SUPERSEDED_CHARTJS_20260719.md
          echo '=== STATUS ===' >> chart-transfer-diagnostic.txt
          git status --short >> chart-transfer-diagnostic.txt 2>&1
          echo '=== STAGED ===' >> chart-transfer-diagnostic.txt
          git diff --cached --name-only | sort >> chart-transfer-diagnostic.txt 2>&1
          echo '=== UNSTAGED ===' >> chart-transfer-diagnostic.txt
          git diff --name-only | sort >> chart-transfer-diagnostic.txt 2>&1
          cat chart-transfer-diagnostic.txt

      - name: Upload transfer diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: chart-transfer-diagnostic-${{ github.sha }}
          path: chart-transfer-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
