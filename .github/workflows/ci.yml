name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  hygiene-rebase:
    name: Hygiene Rebase
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'audit/repository-hygiene-v3-20260719'
    steps:
      - name: Checkout exact Hygiene branch
        uses: actions/checkout@v4
        with:
          ref: audit/repository-hygiene-v3-20260719
          fetch-depth: 0

      - name: Rebase on current main and restore full Hygiene CI
        shell: bash
        run: |
          set -euo pipefail
          cp .github/workflows/ci.yml /tmp/rebase-ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main --quiet
          git rebase origin/main
          git show ORIG_HEAD^:.github/workflows/ci.yml > /tmp/previous-ci.yml || true
          cp /tmp/previous-ci.yml .github/workflows/ci.yml
          git add .github/workflows/ci.yml
          git commit -m 'chore(ci): restore Hygiene quality workflow after rebase'
          git push --force-with-lease origin HEAD:audit/repository-hygiene-v3-20260719
