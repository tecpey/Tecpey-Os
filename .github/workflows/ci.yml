name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  arena-command-recovery-diagnostic:
    name: Arena Command Recovery Diagnostic
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'feat/trading-arena-authoritative-ui-v2'
    steps:
      - name: Checkout exact feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/trading-arena-authoritative-ui-v2
          fetch-depth: 0

      - name: Capture exact patch result
        shell: bash
        run: |
          set +e
          python scripts/_apply_arena_command_recovery.py > /tmp/arena-patch.log 2>&1
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ]; then
            cp /tmp/arena-patch.log .github/ARENA_COMMAND_RECOVERY_ERROR
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .github/ARENA_COMMAND_RECOVERY_ERROR
            git commit -m 'chore(arena): capture command recovery patch mismatch'
            git push origin HEAD:feat/trading-arena-authoritative-ui-v2
            exit 1
          fi
          echo 'patch unexpectedly succeeded; no diagnostic commit required'
