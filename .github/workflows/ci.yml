name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  transfer-chart-cleanup:
    name: Transfer Verified Chart.js Cleanup
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chore/remove-superseded-chartjs-final-20260719'
    steps:
      - name: Checkout exact final branch
        uses: actions/checkout@v4
        with:
          ref: chore/remove-superseded-chartjs-final-20260719
          fetch-depth: 0

      - name: Transfer only permanent cleanup files
        run: |
          set -euo pipefail
          git fetch origin chore/remove-superseded-chartjs-path-20260719 main --quiet
          git checkout origin/chore/remove-superseded-chartjs-path-20260719 -- \
            package.json \
            package-lock.json \
            docs/audits/CLEANUP_SUPERSEDED_CHARTJS_20260719.md
          git rm src/app/crypto/'[symbol]'/ChartWrapper.tsx
          git rm src/components/crypto/LivePriceChart.tsx
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml

      - name: Verify transferred boundaries
        run: |
          node - <<'NODE'
          const pkg = require('./package.json');
          for (const name of ['chart.js', 'react-chartjs-2']) {
            if (pkg.dependencies?.[name] || pkg.devDependencies?.[name]) {
              throw new Error(`${name}_direct_dependency_still_present`);
            }
          }
          if (!pkg.dependencies?.recharts) throw new Error('recharts_must_remain');
          NODE
          node scripts/audit-repository-hygiene.mjs --json > /tmp/hygiene.json
          node - <<'NODE'
          const report = require('/tmp/hygiene.json');
          if (report.unreferencedDependencies.length) {
            throw new Error(`unexpected_unreferenced_dependencies:${report.unreferencedDependencies.map(x => x.name).join(',')}`);
          }
          NODE
          git diff --check

      - name: Commit clean current-main result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/ci.yml \
                  package.json \
                  package-lock.json \
                  docs/audits/CLEANUP_SUPERSEDED_CHARTJS_20260719.md \
                  src/app/crypto/'[symbol]'/ChartWrapper.tsx \
                  src/components/crypto/LivePriceChart.tsx
          git diff --cached --check
          git commit -m 'chore(charts): remove superseded Chart.js path'
          git push origin HEAD:chore/remove-superseded-chartjs-final-20260719
