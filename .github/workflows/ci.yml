name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SITE_URL: https://tecpey.ir
      NEXT_PUBLIC_API_URL: https://my.tecpey.ir
      NEXT_PUBLIC_API_the model_URL: https://ci-placeholder.tecpey.ir
      NEXT_PUBLIC_API_SOCKET_URL: wss://ci-placeholder.tecpey.ir/spot
      TECPEY_SESSION_SECRET: ci-placeholder-session-secret-32-chars-min
      CERTIFICATE_SIGNING_SECRET: ci-placeholder-cert-signing-secret-32-min
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
      TECPEY_ACADEMY_AUTH_SECRET: ci-placeholder-academy-auth-secret-32chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify npm version
        run: |
          NPM_MAJOR=$(npm --version | cut -d. -f1)
          if [ "$NPM_MAJOR" != "10" ]; then
            echo "ERROR: npm major version must be 10. Got: $(npm --version)"
            exit 1
          fi
          echo "npm $(npm --version) OK"

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: TypeScript
        run: ./node_modules/.bin/tsc --noEmit

      - name: ESLint
        run: ./node_modules/.bin/eslint . --max-warnings 0

      - name: Browser persistence guard
        run: node scripts/check-browser-persistence.mjs

      - name: Tests
        run: npm test

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

  migrate_verified_changes:
    name: One-time Clean Branch Migration
    if: ${{ github.event_name == 'pull_request' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout clean replacement branch
        uses: actions/checkout@v4
        with:
          ref: feat/academy-official-progress-server-20260718-v2
          fetch-depth: 0

      - name: Copy reviewed production and test files
        run: |
          set -euo pipefail
          SOURCE_BRANCH=feat/academy-legacy-progress-server-20260718
          git fetch origin "$SOURCE_BRANCH:refs/remotes/origin/$SOURCE_BRANCH"

          files=(
            scripts/check-browser-persistence.mjs
            src/app/api/academy-lesson-progress/route.ts
            src/components/academy/AcademyInteractiveRoadmap.tsx
            src/components/academy/AcademyLessonCompletionControl.tsx
            src/components/academy/AcademyStudentDashboard.tsx
            src/components/academy/AcademyTermPage.tsx
            src/components/academy/AcademyTermPageEn.tsx
            src/components/academy/TermQuizClient.tsx
            src/hooks/useAcademyPathProgress.ts
            src/lib/academy-lesson-progress.ts
            src/lib/db-migrate-user-state.ts
            src/lib/mentor-events.ts
            src/tests/academy/lesson-progress-model.test.ts
            src/tests/academy/path-progress.test.ts
          )

          for file in "${files[@]}"; do
            mkdir -p "$(dirname "$file")"
            git show "origin/$SOURCE_BRANCH:$file" > "$file"
          done

      - name: Restore protected CI workflow
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Commit clean migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml scripts src
          git commit -m "feat(academy): migrate official server progress onto latest main"
          git push origin HEAD:feat/academy-official-progress-server-20260718-v2
