name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  arena-typecheck-diagnostic:
    name: Arena TypeScript Diagnostic
    runs-on: ubuntu-latest
    steps:
      - name: Clone branch quietly
        run: git clone --quiet --depth 1 --branch feat/trading-arena-authoritative-execution-20260719 https://github.com/tecpey/Tecpey-Os.git repo
      - name: Install quietly
        working-directory: repo
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund --silent
      - name: TypeScript errors
        working-directory: repo
        run: ./node_modules/.bin/tsc --noEmit --pretty false

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SITE_URL: https://tecpey.ir
      NEXT_PUBLIC_API_URL: https://my.tecpey.ir
      NEXT_PUBLIC_API_the model_URL: https://ci-placeholder.tecpey.ir
      NEXT_PUBLIC_API_SOCKET_URL: wss://ci-placeholder.tecpey.ir/spot
      TECPEY_SESSION_SECRET: ci-placeholder-session-secret-32-chars-min
      CERTIFICATE_SIGNING_SECRET: ci-placeholder-cert-signing-secret-32-min
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
      TECPEY_ACADEMY_AUTH_SECRET: ci-placeholder-academy-auth-secret-32chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify npm version
        run: |
          NPM_MAJOR=$(npm --version | cut -d. -f1)
          if [ "$NPM_MAJOR" != "10" ]; then
            echo "ERROR: npm major version must be 10. Got: $(npm --version)"
            exit 1
          fi
          echo "npm $(npm --version) OK"

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: TypeScript
        run: ./node_modules/.bin/tsc --noEmit

      - name: ESLint
        run: ./node_modules/.bin/eslint . --max-warnings 0

      - name: Browser persistence guard
        run: node scripts/check-browser-persistence.mjs

      - name: Admin authentication boundary guard
        run: node scripts/check-admin-auth-boundary.mjs

      - name: Tests
        run: npm test

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build
