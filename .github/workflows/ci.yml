name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SITE_URL: https://tecpey.ir
      NEXT_PUBLIC_API_URL: https://my.tecpey.ir
      NEXT_PUBLIC_API_the model_URL: https://ci-placeholder.tecpey.ir
      NEXT_PUBLIC_API_SOCKET_URL: wss://ci-placeholder.tecpey.ir/spot
      TECPEY_SESSION_SECRET: ci-placeholder-session-secret-32-chars-min
      CERTIFICATE_SIGNING_SECRET: ci-placeholder-cert-signing-secret-32-min
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
      TECPEY_ACADEMY_AUTH_SECRET: ci-placeholder-academy-auth-secret-32chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify npm version
        run: |
          NPM_MAJOR=$(npm --version | cut -d. -f1)
          if [ "$NPM_MAJOR" != "10" ]; then
            echo "ERROR: npm major version must be 10. Got: $(npm --version)"
            exit 1
          fi
          echo "npm $(npm --version) OK"

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: TypeScript
        run: ./node_modules/.bin/tsc --noEmit

      - name: ESLint
        run: ./node_modules/.bin/eslint . --max-warnings 0

      - name: Tests
        run: npm test

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

  temporary_refactor:
    name: One-time Academy Path Refactor
    if: ${{ github.event_name == 'pull_request' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/academy-legacy-progress-server-20260718
          fetch-depth: 0

      - name: Apply exact server-source refactor
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(source: str, pattern: str, replacement: str, label: str) -> str:
              result, count = re.subn(pattern, replacement, source, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, got {count}')
              return result

          quiz_path = Path('src/components/academy/TermQuizClient.tsx')
          quiz = quiz_path.read_text()
          quiz = replace_once(
              quiz,
              r'\n        const savedLead = window\.localStorage\.getItem\("tecpey-academy-lead"\);.*?\n\n        const profileResponse',
              '\n        const profileResponse',
              'TermQuizClient lead hydration',
          )
          quiz = replace_once(
              quiz,
              r'    if \(!storageKey \|\| !completed\) return;',
              '    if (!completed) return;',
              'TermQuizClient completion guard',
          )
          quiz = replace_once(
              quiz,
              r'\n          const payload = \{ score:.*?termNumber \};\n          try \{.*?\n          \} catch \{\}',
              '\n          window.dispatchEvent(new Event("tecpey-academy-progress-updated"));',
              'TermQuizClient result browser copy',
          )
          quiz = replace_once(
              quiz,
              r'\n      window\.localStorage\.setItem\("tecpey-academy-lead".*?\);',
              '',
              'TermQuizClient lead browser write',
          )
          if 'localStorage' in quiz:
              raise SystemExit('TermQuizClient still contains localStorage')
          quiz_path.write_text(quiz)

          dashboard_path = Path('src/components/academy/AcademyStudentDashboard.tsx')
          dashboard = dashboard_path.read_text()
          dashboard = replace_once(
              dashboard,
              r'import \{ useEffect, useMemo, useState \} from "react";',
              'import { useEffect, useMemo, useState } from "react";\nimport { useAcademyPathProgress } from "@/hooks/useAcademyPathProgress";',
              'Dashboard hook import',
          )
          dashboard = replace_once(
              dashboard,
              r'\ntype CloudTerm = \{.*?\};',
              '',
              'Dashboard CloudTerm type',
          )
          dashboard = replace_once(
              dashboard,
              r'function safeParse\(.*?(?=function levelFromXp\()',
              '',
              'Dashboard browser helper block',
          )
          dashboard = replace_once(
              dashboard,
              r'  const \[loaded, setLoaded\] = useState\(false\);\n  const \[termProgress, setTermProgress\] = useState<Record<string, ProgressItem>>\(\{\}\);',
              '  const { loaded, termProgress } = useAcademyPathProgress(locale);',
              'Dashboard progress state',
          )
          dashboard = replace_once(
              dashboard,
              r'  useEffect\(\(\) => \{\n    let active = true;\n    const read = async \(\) => \{.*?(?=  useEffect\(\(\) => \{\n    let active = true;\n    fetch\("/api/academy-student-profile")',
              '',
              'Dashboard browser progress effect',
          )
          if 'localStorage' in dashboard:
              raise SystemExit('AcademyStudentDashboard still contains localStorage')
          dashboard_path.write_text(dashboard)

          roadmap_path = Path('src/components/academy/AcademyInteractiveRoadmap.tsx')
          roadmap = roadmap_path.read_text()
          roadmap = replace_once(
              roadmap,
              r'import \{ useEffect, useMemo, useState \} from "react";',
              'import { useMemo } from "react";\nimport { useAcademyPathProgress } from "@/hooks/useAcademyPathProgress";',
              'Roadmap hook import',
          )
          roadmap = replace_once(
              roadmap,
              r'type Progress =.*?(?=export function AcademyInteractiveRoadmap\(\))',
              '',
              'Roadmap browser helper block',
          )
          roadmap = replace_once(
              roadmap,
              r'  const \[progress, setProgress\].*?(?=  const completedTerms =)',
              '  const { termProgress: progress } = useAcademyPathProgress("fa");\n\n',
              'Roadmap browser progress effect',
          )
          if 'localStorage' in roadmap or 'addEventListener("storage"' in roadmap:
              raise SystemExit('AcademyInteractiveRoadmap still contains browser persistence')
          roadmap_path.write_text(roadmap)
          PY

      - name: Restore protected workflow files
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/academy-path-server-refactor.yml

      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/academy/TermQuizClient.tsx src/components/academy/AcademyStudentDashboard.tsx src/components/academy/AcademyInteractiveRoadmap.tsx .github/workflows/ci.yml .github/workflows/academy-path-server-refactor.yml
          git commit -m "refactor(academy): remove browser-authoritative path progress"
          git push origin HEAD:feat/academy-legacy-progress-server-20260718
