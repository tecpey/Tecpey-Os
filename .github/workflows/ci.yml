name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  remove-chartjs:
    name: Remove Superseded Chart.js Dependencies
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chore/remove-superseded-chartjs-path-20260719'
    steps:
      - name: Checkout exact cleanup branch
        uses: actions/checkout@v4
        with:
          ref: chore/remove-superseded-chartjs-path-20260719
          fetch-depth: 0

      - name: Setup governed Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify governed npm version
        run: test "$(npm --version | cut -d. -f1)" = "10"

      - name: Install exact dependency graph
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Remove superseded dependencies
        run: npm uninstall chart.js react-chartjs-2 --save --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Verify dependency boundaries
        run: |
          node - <<'NODE'
          const pkg = require('./package.json');
          for (const name of ['chart.js', 'react-chartjs-2']) {
            if (pkg.dependencies?.[name] || pkg.devDependencies?.[name]) {
              throw new Error(`${name}_direct_dependency_still_present`);
            }
          }
          if (!pkg.dependencies?.recharts) throw new Error('recharts_must_remain');
          NODE
          node scripts/audit-repository-hygiene.mjs --json > /tmp/hygiene.json
          node - <<'NODE'
          const report = require('/tmp/hygiene.json');
          const names = report.unreferencedDependencies.map((item) => item.name);
          if (names.length) throw new Error(`unexpected_unreferenced_dependencies:${names.join(',')}`);
          NODE
          git diff --check

      - name: Restore canonical CI and remove transport workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main --quiet
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git rm .github/workflows/remove-superseded-chartjs.yml
          git add .github/workflows/ci.yml package.json package-lock.json
          git diff --cached --check
          git commit -m 'chore(charts): remove superseded Chart.js dependencies'
          git push origin HEAD:chore/remove-superseded-chartjs-path-20260719
