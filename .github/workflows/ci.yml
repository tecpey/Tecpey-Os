name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  metadata-hygiene-patch:
    name: Metadata Hygiene Patch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: chore/repository-metadata-hygiene-v2-20260719
          fetch-depth: 0

      - name: Restore full files and apply asserted metadata changes
        shell: bash
        run: |
          git fetch origin main --quiet
          git show origin/main:README.md > README.md
          git show origin/main:docs/TECPEY_MASTER_BLUEPRINT.md > docs/TECPEY_MASTER_BLUEPRINT.md
          git show origin/main:package.json > package.json
          git show origin/main:package-lock.json > package-lock.json

          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one match in {path}, found {count}: {old!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          readme = "README.md"
          replace_once(
              readme,
              "**Education First • Intelligence Native • Enterprise Ready**",
              "**Education First • Intelligence Native • Production Hardening**",
          )
          replace_once(
              readme,
              "![License](https://img.shields.io/badge/license-private-red)",
              "![License](https://img.shields.io/badge/license-proprietary-red)",
          )
          replace_once(
              readme,
              "![Architecture](https://img.shields.io/badge/architecture-multi--tenant-success)",
              "![Architecture](https://img.shields.io/badge/architecture-single--tenant%20core-f59e0b)\n\n![Roadmap](https://img.shields.io/badge/roadmap-multi--tenant%20%2F%20white--label-8b5cf6)",
          )
          replace_once(
              readme,
              "</div>\n\n---\n\n# English",
              "</div>\n\n---\n\n## Implementation Reality\n\nTecPey OS is under active production hardening. The current deployment foundation is intentionally single-tenant while multi-tenant and white-label isolation remain open platform gates. A capability is treated as production-ready only after its server-side authority, security, recovery, CI, integration and runtime evidence are complete.\n\n---\n\n# English",
          )
          replace_once(
              readme,
              "This architecture allows TecPey to scale from individual users to enterprise customers without rebuilding its foundation.",
              "The architecture is being hardened so TecPey can evolve from its initial single-tenant product into enterprise and white-label deployments without weakening core security and data-authority boundaries.",
          )

          blueprint = Path("docs/TECPEY_MASTER_BLUEPRINT.md")
          text = blueprint.read_text(encoding="utf-8")
          prefix = "import logging\n\nlogging.basicConfig(level=logging.INFO)\nlogger = logging.getLogger(__name__)\n\n"
          if not text.startswith(prefix):
              raise SystemExit("unexpected Master Blueprint preamble")
          blueprint.write_text(text[len(prefix):], encoding="utf-8")
          PY

          npm pkg set name=tecpey-os
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund --silent

          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "tecpey-ci"
          git config user.email "actions@users.noreply.github.com"
          git add README.md docs/TECPEY_MASTER_BLUEPRINT.md package.json package-lock.json .github/workflows/ci.yml
          git commit -m "chore(repo): align TecPey OS metadata with implementation reality"
          git push origin HEAD:chore/repository-metadata-hygiene-v2-20260719
