name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  transfer-chart-cleanup:
    name: Diagnose Verified Chart.js Cleanup Transfer
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chore/remove-superseded-chartjs-final-20260719'
    steps:
      - name: Checkout exact final branch
        uses: actions/checkout@v4
        with:
          ref: chore/remove-superseded-chartjs-final-20260719
          fetch-depth: 0

      - name: Transfer and stage permanent cleanup files
        run: |
          set -euo pipefail
          git fetch origin chore/remove-superseded-chartjs-path-20260719 --quiet
          git checkout origin/chore/remove-superseded-chartjs-path-20260719 -- \
            package.json \
            package-lock.json \
            docs/audits/CLEANUP_SUPERSEDED_CHARTJS_20260719.md
          git rm 'src/app/crypto/[symbol]/ChartWrapper.tsx'
          git rm src/components/crypto/LivePriceChart.tsx
          git add package.json package-lock.json docs/audits/CLEANUP_SUPERSEDED_CHARTJS_20260719.md
          git diff --check
          git diff --cached --check

      - name: Capture commit and push diagnostics
        shell: bash
        run: |
          set +e
          {
            echo '=== STATUS ==='
            git status --short
            echo '=== STAGED ==='
            git diff --cached --name-only | sort
            echo '=== UNSTAGED ==='
            git diff --name-only | sort
            echo '=== COMMIT ==='
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'chore(charts): remove superseded Chart.js path'
            COMMIT_STATUS=$?
            echo "COMMIT_STATUS=$COMMIT_STATUS"
            if [ "$COMMIT_STATUS" -eq 0 ]; then
              echo '=== PUSH ==='
              git push origin HEAD:chore/remove-superseded-chartjs-final-20260719
              PUSH_STATUS=$?
              echo "PUSH_STATUS=$PUSH_STATUS"
            else
              PUSH_STATUS=99
            fi
            echo "FINAL_COMMIT_STATUS=$COMMIT_STATUS"
            echo "FINAL_PUSH_STATUS=$PUSH_STATUS"
          } > chart-transfer-diagnostic.txt 2>&1
          cat chart-transfer-diagnostic.txt
          exit 0

      - name: Upload transfer diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: chart-transfer-diagnostic-${{ github.sha }}
          path: chart-transfer-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
