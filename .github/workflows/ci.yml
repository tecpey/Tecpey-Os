name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SITE_URL: https://tecpey.ir
      NEXT_PUBLIC_API_URL: https://my.tecpey.ir
      NEXT_PUBLIC_API_the model_URL: https://ci-placeholder.tecpey.ir
      NEXT_PUBLIC_API_SOCKET_URL: wss://ci-placeholder.tecpey.ir/spot
      TECPEY_SESSION_SECRET: ci-placeholder-session-secret-32-chars-min
      CERTIFICATE_SIGNING_SECRET: ci-placeholder-cert-signing-secret-32-min
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder
      TECPEY_ACADEMY_AUTH_SECRET: ci-placeholder-academy-auth-secret-32chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify npm version
        run: |
          NPM_MAJOR=$(npm --version | cut -d. -f1)
          if [ "$NPM_MAJOR" != "10" ]; then
            echo "ERROR: npm major version must be 10. Got: $(npm --version)"
            exit 1
          fi
          echo "npm $(npm --version) OK"

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: TypeScript
        run: ./node_modules/.bin/tsc --noEmit

      - name: ESLint
        run: ./node_modules/.bin/eslint . --max-warnings 0

      - name: Tests
        run: npm test

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

  temporary_refactor:
    name: One-time Academy Path Refactor
    if: ${{ github.event_name == 'pull_request' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/academy-legacy-progress-server-20260718
          fetch-depth: 0

      - name: Apply exact server-source refactor
        run: |
          python - <<'PY'
          from pathlib import Path

          quiz_path = Path('src/components/academy/TermQuizClient.tsx')
          quiz = quiz_path.read_text()
          lead_block = '''        const savedLead = window.localStorage.getItem("tecpey-academy-lead");
          if (savedLead) {
            const parsed = JSON.parse(savedLead);
            if (parsed?.name && parsed?.phone) {
              setLead({ name: parsed.name, phone: parsed.phone });
              setLeadSaved(true);
            }
          }

'''
          result_block = '''          const payload = { score: Number(data?.score || 0), percent: Number(data?.percent || 0), passed: Boolean(data?.passed), completedAt: new Date().toISOString(), termNumber };
          try {
            window.localStorage.setItem(storageKey, JSON.stringify(payload));
            window.localStorage.setItem(`tecpey-academy-term-${termNumber}`, JSON.stringify(payload));
            window.dispatchEvent(new Event("tecpey-academy-progress-updated"));
          } catch {}
'''
          lead_write = '      window.localStorage.setItem("tecpey-academy-lead", JSON.stringify({ name: cleanName, phone: cleanPhone, locale, termNumber, createdAt: new Date().toISOString() }));\n'
          for anchor, name in [(lead_block, 'lead hydration'), (result_block, 'quiz result copy'), (lead_write, 'lead write')]:
              if quiz.count(anchor) != 1:
                  raise SystemExit(f'TermQuizClient: expected {name} exactly once')
          quiz = quiz.replace(lead_block, '', 1)
          quiz = quiz.replace('    if (!storageKey || !completed) return;\n', '    if (!completed) return;\n', 1)
          quiz = quiz.replace(result_block, '          window.dispatchEvent(new Event("tecpey-academy-progress-updated"));\n', 1)
          quiz = quiz.replace(lead_write, '', 1)
          if 'localStorage' in quiz:
              raise SystemExit('TermQuizClient still contains localStorage')
          quiz_path.write_text(quiz)

          dashboard_path = Path('src/components/academy/AcademyStudentDashboard.tsx')
          dashboard = dashboard_path.read_text()
          dashboard = dashboard.replace(
              'import { useEffect, useMemo, useState } from "react";\n',
              'import { useEffect, useMemo, useState } from "react";\nimport { useAcademyPathProgress } from "@/hooks/useAcademyPathProgress";\n',
              1,
          )
          dashboard = dashboard.replace('type CloudTerm = { term_number?: number; score?: number; percent?: number; status?: string };\n', '', 1)
          helper_start = dashboard.index('function safeParse(')
          helper_end = dashboard.index('function levelFromXp(', helper_start)
          dashboard = dashboard[:helper_start] + dashboard[helper_end:]
          state_block = '''  const [loaded, setLoaded] = useState(false);
          const [termProgress, setTermProgress] = useState<Record<string, ProgressItem>>({});
'''
          if dashboard.count(state_block) != 1:
              raise SystemExit('Dashboard state anchor not found exactly once')
          dashboard = dashboard.replace(state_block, '  const { loaded, termProgress } = useAcademyPathProgress(locale);\n', 1)
          effect_start = dashboard.index('  useEffect(() => {\n    let active = true;\n    const read = async () => {')
          effect_end = dashboard.index('  useEffect(() => {\n    let active = true;\n    fetch("/api/academy-student-profile"', effect_start)
          dashboard = dashboard[:effect_start] + dashboard[effect_end:]
          if 'localStorage' in dashboard:
              raise SystemExit('AcademyStudentDashboard still contains localStorage')
          dashboard_path.write_text(dashboard)

          roadmap_path = Path('src/components/academy/AcademyInteractiveRoadmap.tsx')
          roadmap = roadmap_path.read_text()
          roadmap = roadmap.replace(
              'import { useEffect, useMemo, useState } from "react";\n',
              'import { useMemo } from "react";\nimport { useAcademyPathProgress } from "@/hooks/useAcademyPathProgress";\n',
              1,
          )
          helper_start = roadmap.index('type Progress =')
          helper_end = roadmap.index('export function AcademyInteractiveRoadmap()', helper_start)
          roadmap = roadmap[:helper_start] + roadmap[helper_end:]
          component_start = roadmap.index('export function AcademyInteractiveRoadmap() {')
          progress_start = roadmap.index('  const [progress, setProgress]', component_start)
          progress_end = roadmap.index('  const completedTerms =', progress_start)
          roadmap = roadmap[:progress_start] + '  const { termProgress: progress } = useAcademyPathProgress("fa");\n\n' + roadmap[progress_end:]
          if 'localStorage' in roadmap or 'addEventListener("storage"' in roadmap:
              raise SystemExit('AcademyInteractiveRoadmap still contains browser persistence')
          roadmap_path.write_text(roadmap)
          PY

      - name: Restore CI and remove temporary workflow
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/academy-path-server-refactor.yml

      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/academy/TermQuizClient.tsx src/components/academy/AcademyStudentDashboard.tsx src/components/academy/AcademyInteractiveRoadmap.tsx .github/workflows/ci.yml .github/workflows/academy-path-server-refactor.yml
          git commit -m "refactor(academy): remove browser-authoritative path progress"
          git push origin HEAD:feat/academy-legacy-progress-server-20260718
