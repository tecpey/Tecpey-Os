name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  arena-state-hardening:
    name: Arena State Hardening
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: feat/trading-arena-authoritative-execution-20260719
          fetch-depth: 0
      - name: Apply marker-based route hardening and restore canonical CI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          route = Path("src/app/api/trading-arena/execution/route.ts")
          text = route.read_text()

          def once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one match, found {count}: {old!r}")
              text = text.replace(old, new, 1)

          def block(start_marker: str, end_marker: str, replacement: str) -> None:
              global text
              start = text.find(start_marker)
              if start < 0:
                  raise SystemExit(f"missing start marker: {start_marker!r}")
              end = text.find(end_marker, start)
              if end < 0:
                  raise SystemExit(f"missing end marker: {end_marker!r}")
              text = text[:start] + replacement + text[end:]

          once(
              "  computeArenaExecutionEquity,\n  normalizeArenaExecutionStateV2,\n",
              "  computeArenaExecutionEquity,\n  createArenaExecutionStateV2,\n",
          )
          once(
              '} from "@/lib/trading-arena-execution-v2";\n',
              '} from "@/lib/trading-arena-execution-v2";\n'
              'import { validateArenaExecutionStateV2 } from "@/lib/trading-arena-execution-state-validation";\n',
          )

          block(
              "function loadExecution(row: AttemptRow)",
              "\n\nfunction canonical",
              '''function loadExecution(row: AttemptRow): { state: ArenaExecutionStateV2; revision: number } {
            const revision = Number(row.execution_revision);
            if (!Number.isSafeInteger(revision) || revision < 0) throw new Error("arena_revision_invalid");
            const raw = row.execution_state;
            const empty = Boolean(
              raw &&
              typeof raw === "object" &&
              !Array.isArray(raw) &&
              Object.keys(raw as Record<string, unknown>).length === 0,
            );
            return {
              state: empty
                ? createArenaExecutionStateV2(row.starting_balance)
                : validateArenaExecutionStateV2(raw),
              revision,
            };
          }''',
          )

          block(
              "    let requestedMarket: ArenaPriceSnapshot | null = null;",
              "\n\n    const hash =",
              '''    let requestedMarket: ArenaPriceSnapshot | null = null;
            if (action.type !== "cancel_order") {
              try {
                requestedMarket = await getArenaMarketPriceSnapshot();
              } catch {
                // The transaction checks idempotent replay before a new
                // price-dependent command fails closed.
              }
            }''',
          )

          once(
              "        const market = requestedMarket ?? execution.state.lastMarket;\n"
              "        if (!market) return { error: \"arena_price_feed_unavailable\" as const };",
              "        if (!requestedMarket && action.type !== \"cancel_order\") {\n"
              "          return { error: \"arena_price_feed_unavailable\" as const };\n"
              "        }\n"
              "        const market = requestedMarket ?? execution.state.lastMarket;\n"
              "        if (!market) return { error: \"arena_price_feed_unavailable\" as const };",
          )

          route.write_text(text)
          subprocess.run(["git", "fetch", "origin", "main", "--quiet"], check=True)
          canonical_ci = subprocess.check_output(
              ["git", "show", "origin/main:.github/workflows/ci.yml"],
              text=True,
          )
          Path(".github/workflows/ci.yml").write_text(canonical_ci)
          PY

          git config user.name "tecpey-ci"
          git config user.email "actions@users.noreply.github.com"
          git add src/app/api/trading-arena/execution/route.ts \
                  .github/workflows/ci.yml
          git commit -m "fix(arena): fail closed on corrupted state and preserve replays"
          git push origin HEAD:feat/trading-arena-authoritative-execution-20260719
