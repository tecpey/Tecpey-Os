name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  arena-eslint-diagnostic:
    name: Arena ESLint Diagnostic
    runs-on: ubuntu-latest
    steps:
      - name: Clone branch quietly
        run: git clone --quiet --depth 1 --branch feat/trading-arena-authoritative-execution-20260719 https://github.com/tecpey/Tecpey-Os.git repo
      - name: Install quietly
        working-directory: repo
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund --silent
      - name: Arena ESLint errors
        working-directory: repo
        run: |
          ./node_modules/.bin/eslint \
            src/app/api/trading-arena/execution/route.ts \
            src/lib/arena-market-price.ts \
            src/lib/db-migrate-user-state.ts \
            src/lib/trading-arena-execution-v2.ts \
            src/tests/arena-market-price-freshness.test.ts \
            src/tests/trading-arena-execution-v2.test.ts \
            --max-warnings 0
