name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  wallet-rebase:
    name: Wallet Hotfix Rebase
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'fix/wallet-bullmq-runtime-safety'
    steps:
      - name: Checkout exact hotfix branch
        uses: actions/checkout@v4
        with:
          ref: fix/wallet-bullmq-runtime-safety
          fetch-depth: 0

      - name: Rebase and restore Redis-enabled quality workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git show HEAD^:.github/workflows/ci.yml > /tmp/wallet-ci.yml
          git fetch origin main --quiet
          git rebase origin/main
          cp /tmp/wallet-ci.yml .github/workflows/ci.yml
          git add .github/workflows/ci.yml
          git commit -m 'chore(ci): restore Redis-backed Wallet quality gate after rebase'
          git push --force-with-lease origin HEAD:fix/wallet-bullmq-runtime-safety
