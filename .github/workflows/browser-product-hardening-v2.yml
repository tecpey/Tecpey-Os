name: One-shot Public Product Hardening V2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/browser-product-hardening-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-shot-public-product-hardening-v2
  cancel-in-progress: false

jobs:
  patch:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/public-browser-golden-path
          fetch-depth: 0

      - name: Apply idempotent reviewed product changes
        run: |
          python - <<'PY'
          from pathlib import Path

          def migrate(path: str, old: str, new: str) -> None:
              file = Path(path)
              source = file.read_text()
              if new in source:
                  print(f"already current: {path}: {new[:70]!r}")
                  return
              count = source.count(old)
              if count == 1:
                  file.write_text(source.replace(old, new, 1))
                  print(f"updated: {path}: {old[:70]!r}")
                  return
              print(f"review required ({count} matches): {path}: {old[:100]!r}")

          migrate(
              "src/components/academy/GlobalAiMentorWidget.tsx",
              "  if (!academyChecked) return null;",
              "  if (!academyChecked || !academyProfileReady) return null;",
          )
          migrate(
              "src/components/academy/PublicMentorEntry.tsx",
              '''        const data = await response.json();
                  if (!active) return;
                  setProfileStatus(data?.profile?.display_name ? "ready" : "absent");''',
              '''        if (!response.ok) {
                    throw new Error(`academy_profile_status_${response.status}`);
                  }
                  const data = (await response.json()) as {
                    profile?: { display_name?: unknown } | null;
                  } | null;
                  if (
                    !data ||
                    typeof data !== "object" ||
                    !Object.prototype.hasOwnProperty.call(data, "profile")
                  ) {
                    throw new Error("academy_profile_response_invalid");
                  }
                  if (!active) return;
                  const displayName = data.profile?.display_name;
                  setProfileStatus(
                    typeof displayName === "string" && displayName.trim()
                      ? "ready"
                      : "absent",
                  );''',
          )
          migrate(
              "src/app/home/enterprise/TecpeyEnterpriseLanding.tsx",
              '["بازارها", "زنده"],',
              '["نمای بازار", "آموزشی"],',
          )

          english = "src/app/en/EnglishLandingClient.tsx"
          migrate(english,
              '{ icon: TrendingUp, title: "Online market board", text: "Learn first, then review live Bitcoin, Tether, Ethereum and other major crypto markets before making decisions." },',
              '{ icon: TrendingUp, title: "Market learning board", text: "Learn first, then review available Bitcoin, Tether, Ethereum and other major-market data in an educational context." },')
          migrate(english,
              '{ value: "50+", label: "crypto dossiers", hint: "with market data and risk context" },',
              '{ value: "$100K", label: "virtual Arena capital", hint: "server-owned practice balance" },')
          migrate(english,
              '{ value: "20+", label: "trader tools", hint: "analysis, risk, on-chain and macro" },',
              '{ value: "3", label: "Arena attempts", hint: "per governed practice cycle" },')
          migrate(english,
              '{ icon: MousePointerClick, title: "Practice", desc: "Quizzes, XP, real scenarios and readiness checks." },',
              '{ icon: MousePointerClick, title: "Practice", desc: "Quizzes, guided exercises and readiness checks." },')
          migrate(english,
              '["Crypto trading platform", "Buy, sell and review live markets with a simple and understandable experience."],',
              '["Market access activation", "Live financial services remain gated until their operational, compliance and release evidence is approved."],')

          layout = "src/app/layout.tsx"
          migrations = [
              ('alternateName: ["تک‌پی", "TecPey Crypto Exchange"],', 'alternateName: ["تک‌پی", "TecPey Financial Education Platform"],'),
              ('{ "@type": "Service", "@id": "https://tecpey.ir/#exchange", name: "TecPey Exchange", alternateName: "صرافی تک‌پی", url: "https://tecpey.ir", serviceType: "Cryptocurrency Exchange", areaServed: "IR" },', '{ "@type": "Service", "@id": "https://tecpey.ir/#market-readiness", name: "TecPey Market Readiness", alternateName: "مسیر آمادگی بازار تک‌پی", url: "https://tecpey.ir/academy/trading-arena", serviceType: "Financial Education and Virtual Trading Practice", areaServed: "IR" },'),
              ('    "@type": "FinancialService",\n    "@id": "https://tecpey.ir/#financial-service",', '    "@type": "EducationalOrganization",\n    "@id": "https://tecpey.ir/#academy-organization",'),
              ('description: "TecPey is a Persian crypto exchange experience for live crypto prices, cryptocurrency education, security guidance and a clearer start in the Iran crypto market.",', 'description: "TecPey is a Persian financial-education and virtual-trading-practice platform focused on security, risk awareness and a clearer entry into digital-asset markets.",'),
              ('default: "تک‌پی | صرافی رمزارز امن، سریع و شفاف",', 'default: "تک‌پی | آموزش رمزارز، تریدینگ آرنا و منتور هوشمند",'),
              ('"تک‌پی صرافی رمزارز فارسی برای مشاهده قیمت لحظه‌ای، خرید و فروش تتر و بیت‌کوین، آموزش، امنیت حساب و شروع سریع معامله است.",', '"تک‌پی پلتفرم آموزش رمزارز، تمرین معاملاتی با سرمایه مجازی، منتور هوشمند و یادگیری امنیت و مدیریت ریسک است؛ خدمات مالی تنها پس از فعال‌سازی و تأیید عملیاتی ارائه می‌شوند.",'),
              ('title: "تک‌پی | صرافی رمزارز امن، سریع و شفاف",', 'title: "تک‌پی | آموزش رمزارز و تمرین معاملاتی امن",'),
              ('"مشاهده قیمت لحظه‌ای رمزارزها، شروع سریع معامله، آموزش، امنیت حساب و پشتیبانی رسمی تک‌پی.",', '"آموزش رمزارز، تمرین در تریدینگ آرنا، منتور هوشمند و مسیر شفاف امنیت و مدیریت ریسک در تک‌پی.",'),
              ('title: "تک‌پی | صرافی رمزارز امن و حرفه‌ای",', 'title: "تک‌پی | آموزش رمزارز و تریدینگ آرنا",'),
              ('description: "بازار رمزارز را با قیمت لحظه‌ای، امنیت، آموزش و مسیر شروع روشن دنبال کنید.",', 'description: "با آموزش رمزارز، تمرین معاملاتی، منتور هوشمند و مدیریت ریسک برای ورود مسئولانه آماده شوید.",'),
          ]
          for old, new in migrations:
              migrate(layout, old, new)

          layout_path = Path(layout)
          source = layout_path.read_text()
          old_services = '''    serviceType: [
                    "Cryptocurrency exchange",
                    "Persian crypto exchange",
                    "Crypto market board",
                    "Cryptocurrency education",
                    "Crypto glossary",
                    "Crypto comparison platform"
                  ],
                  provider: {
                    "@id": "https://tecpey.ir/#organization"
                  }'''
          new_services = '''    knowsAbout: [
                    "Cryptocurrency education",
                    "Account security",
                    "Risk management",
                    "Virtual trading practice",
                    "Digital asset literacy"
                  ],
                  parentOrganization: {
                    "@id": "https://tecpey.ir/#organization"
                  }'''
          if new_services not in source and old_services in source:
              layout_path.write_text(source.replace(old_services, new_services, 1))

          source = layout_path.read_text()
          old_keywords = '''      "صرافی ارز دیجیتال",
                    "خرید بیت کوین",
                    "خرید تتر",
                    "قیمت رمزارز",
                    "آموزش رمزارز",
                    "صرافی رمزارز ایران",
                    "امنیت رمزارز",
                    "تک‌پی",'''
          new_keywords = '''      "آموزش رمزارز",
                    "تریدینگ آرنا",
                    "تمرین معامله با سرمایه مجازی",
                    "منتور هوشمند مالی",
                    "مدیریت ریسک",
                    "امنیت رمزارز",
                    "سواد مالی دیجیتال",
                    "تک‌پی",'''
          if new_keywords not in source and old_keywords in source:
              layout_path.write_text(source.replace(old_keywords, new_keywords, 1))
          PY

      - name: Remove one-shot workflow and commit product changes
        run: |
          rm -f .github/workflows/browser-product-hardening-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ui): enforce truthful and single-mentor public boundary"
          git push origin HEAD:fix/public-browser-golden-path
