name: Temporary Sync Admin Security Foundation

on:
  push:
    branches:
      - feat/admin-security-foundation-20260718-v2

permissions:
  contents: write

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, 'chore: sync Admin Security Foundation with main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/admin-security-foundation-20260718-v2
          fetch-depth: 0
      - name: Merge protected main and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main
          git rm .github/workflows/sync-admin-security-temp.yml
          git commit -m "chore: sync Admin Security Foundation with main"
          git push origin HEAD:feat/admin-security-foundation-20260718-v2
