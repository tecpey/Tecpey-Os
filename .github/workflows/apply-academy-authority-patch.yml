name: Apply Academy Authority Patch — One Shot

on:
  push:
    branches:
      - feat/academy-server-reward-authority
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-academy-authority-patch
  cancel-in-progress: true

jobs:
  apply:
    name: Verify and apply reviewed authority patch
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'feat/academy-server-reward-authority')
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/academy-server-reward-authority

      - name: Reassemble and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/academy-authority.patch.gz.b64.part* \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/academy-authority.patch

          echo '8a1a7826d509bb39a5efac3b2c7692d06511b43e6fd32af47877112f5f38fa52  /tmp/academy-authority.patch' \
            | sha256sum --check --strict

          git apply --check /tmp/academy-authority.patch

      - name: Apply reviewed product patch
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/academy-authority.patch
          git diff --check
          node scripts/check-academy-authority.mjs

          # GitHub App tokens cannot publish workflow-file mutations. Keep both
          # workflow files unchanged in this bot-authored product commit; the
          # connected maintainer applies the CI guard and removes this one-shot
          # workflow in separate commits after the product push succeeds.
          git checkout HEAD -- .github/workflows/ci.yml
          git checkout HEAD -- .github/workflows/apply-academy-authority-patch.yml

      - name: Remove non-workflow transfer files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/academy-authority.patch.gz.b64.part*
          rm -f .github/ACADEMY_AUTHORITY_TRANSFER_*.md

      - name: Commit and publish authoritative Academy product changes
        id: publish
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            set -x
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add --all
            git diff --cached --check
            git commit -m 'feat(academy): enforce server-issued progress authority'
            git push origin HEAD:feat/academy-server-reward-authority
          } > /tmp/academy-authority-publish.log 2>&1
          status=$?
          cat /tmp/academy-authority-publish.log
          exit "$status"

      - name: Upload publication evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academy-authority-publication-evidence
          path: /tmp/academy-authority-publish.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce successful publication
        if: steps.publish.outcome == 'failure'
        run: exit 1
